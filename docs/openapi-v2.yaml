    BadRequest:
      description: A path or query parameter is invalid.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalError:
      description: The request could not be completed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ServiceUnavailable:
      description: The cached live contract state is not currently available.
      headers:
        Retry-After:
          description: Seconds until the next scheduled live-state refresh.
          required: true
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: The admin key header is missing or wrong.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Conflict:
      description: The request conflicts with an existing record.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    RequestTooLarge:
      description: |
        The request body exceeds the global 1 MiB cap. The same limit is
        enforced on every route by the shared middleware chain.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    RateLimited:
      description: The per-operation rate limit was exceeded.
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          required: true
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    AdminDisabled:
      description: Admin authentication is not configured; the operation fails closed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
