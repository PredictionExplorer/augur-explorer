        appears on the taker side only after a purchase records it.
        Unindexed wallets return empty pages; cursors are bound to the
        wallet.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkOfferHistoryPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/statistics:
    get:
      operationId: getRandomWalkStatistics
      summary: Get exact global RandomWalk statistics
      description: |
        Returns one consistent snapshot of collection, marketplace and
        withdrawal aggregates with exact wei amounts. The optional last
        mint and latest withdrawal are present once the corresponding
        event exists.
      tags:
        - RandomWalk
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkStatistics"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/statistics/trading-volume:
    get:
      operationId: getRandomWalkTradingVolume
      summary: Get bounded RandomWalk trading-volume buckets
      description: |
        Buckets completed purchases into a zero-filled series anchored at
        `from`. `baseVolumeWei` is the exact volume traded before the
        window, and every bucket carries the exact running total, so a
        chart can continue the all-time curve. The window may produce at
        most 2,000 buckets.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one day.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 86400
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkTradingVolume"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/statistics/listing-floor-history:
    get:
      operationId: getRandomWalkListingFloorHistory
      summary: Get the cheapest new sell listing per time bucket
      description: |
        Returns the minimum price among sell offers created inside each
        bucket of the `from`-anchored window — listing pressure over
        time, not a reconstruction of the historical order book. Buckets
        without new sell listings are omitted. The window may span at
        most 2,000 buckets.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one day.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 86400
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkListingFloorHistory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/statistics/mint-report:
    get:
      operationId: getRandomWalkMintReport
      summary: Get monthly RandomWalk mint aggregates
      description: |
        Returns one row per calendar month that recorded at least one
        mint, oldest first, with exact minted wei and the exact running
        total. Minting has concluded, so the report is bounded and
        stable.
      tags:
        - RandomWalk
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkMintReport"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/withdrawals:
    get:
      operationId: listRandomWalkWithdrawals
      summary: List RandomWalk mint-pool withdrawals
      description: |
        Returns the immutable withdrawal ledger newest first by event-log
        ID. Each row is one exact withdrawal by the wallet that held the
        last minted token at that time.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkWithdrawalPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/contracts/addresses:
    get:
      operationId: getRandomWalkContractAddresses
      summary: Get the deployed RandomWalk contract registry
      description: |
        Returns the RandomWalk NFT and marketplace addresses from the
        database-backed registry the indexer uses. Addresses are
        canonical and the response performs no contract RPC.
      tags:
        - RandomWalk
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkContractAddresses"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/ranking/random-tokens:
    get:
      operationId: getRandomWalkRankingRandomTokens
      summary: Get beauty-contest exploration tokens
      description: |
        Returns up to `sampleSize` token ids for the beauty-contest
        explorer, preferring tokens with the fewest recorded matches and
        then the lowest rating so coverage stays even. The selection is
        intentionally not stable between calls.
      tags:
        - RandomWalk ranking
      parameters:
        - $ref: "#/components/parameters/RankingSampleSize"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkRankingRandomTokens"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/ranking/pair:
    get:
      operationId: getRandomWalkRankingPair
      summary: Get one beauty-contest pair to vote on
      description: |
        Returns two distinct token ids for a beauty vote. With `voter`,
        the selection re-rolls (up to fifty attempts) to find a pair the
        wallet has not voted on; `pairExhausted` reports that every
        attempt was already voted, in which case the last pair is
        returned anyway and a vote on it will answer 409. Without
        `voter` the pair is unfiltered. A collection with fewer than two
        tokens answers 404.
      tags:
        - RandomWalk ranking
      parameters:
        - $ref: "#/components/parameters/RankingVoter"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkRankingPair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/ranking/ratings:
    get:
      operationId: listRandomWalkRankingRatings
      summary: List beauty-contest ratings for every token
      description: |
        Returns the full collection ordered by Elo rating ascending (the
        least beautiful first, matching the legacy rating order), then
        by token id. Tokens that never appeared in a match carry the
        default rating 1200 and a zero match count. Ratings move as
        votes arrive, so clients needing a fresh ranking restart from
        the first page; continuation cursors resume strictly after the
        cursor position.
      tags:
        - RandomWalk ranking
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkRankingRatingPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/ranking/statistics:
    get:
      operationId: getRandomWalkRankingStatistics
      summary: Get beauty-contest vote statistics
      description: |
        Returns one consistent snapshot of the beauty contest: total
        recorded matches, how many were wallet-signed votes, the number
        of distinct voting wallets and the number of tokens holding a
        recorded rating.
      tags:
        - RandomWalk ranking
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkRankingStatistics"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/ranking/challenges:
    post:
      operationId: createRandomWalkRankingChallenge
      summary: Create a one-time challenge for a wallet-signed vote
      description: |
        Issues the one-time nonce a wallet must embed in its signed vote
        message. The nonce expires at `expiresAt` (fifteen minutes) and
        is consumed by the first vote that presents it. The operation
        has no request body.
      tags:
        - RandomWalk ranking
      responses:
        "201":
          $ref: "#/components/responses/RandomWalkRankingChallengeCreated"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/ranking/votes:
    post:
      operationId: createRandomWalkRankingVote
      summary: Record a wallet-signed beauty vote
      description: |
        Records one beauty vote and applies the Elo update. The wallet
        signs the canonical message (EIP-191 personal_sign) binding the
        chain id, the challenge nonce, both token ids and the winner;
        the recovered signer becomes the voter of record. Each wallet
        may vote once per unordered pair; a repeat answers 409. Invalid
        pairs, disallowed chains, malformed signatures and unknown or
        expired nonces answer 400 problems with specific types.
      tags:
        - RandomWalk ranking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RankingVoteRequest"
      responses:
        "201":
          $ref: "#/components/responses/RandomWalkRankingVoteRecorded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/RequestTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/ranking/matches:
    post:
      operationId: recordRandomWalkRankingMatch
      summary: Record a beauty-contest match result (admin)
      description: |
        Records one pairwise result without a voter of record and
        applies the Elo update. Requires the X-Ranking-Admin-Key header
        (RANKING_ADMIN_KEY, falling back to ADMIN_API_KEY); when no key
        is configured the operation fails closed with 503. Public
        voting must use the wallet-signed votes operation instead.
      tags:
        - RandomWalk ranking
      security:
        - RankingAdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RankingMatchRequest"
      responses:
        "201":
          $ref: "#/components/responses/RandomWalkRankingMatchRecorded"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/RequestTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/AdminDisabled"
components:
  parameters:
    Round:
      name: round
      in: path
      required: true
      description: Zero-based CosmicGame round number.
      schema:
        type: integer
        format: int64
        minimum: 0
    BidId:
      name: bidId
      in: path
      required: true
      description: Database identifier of a CosmicGame bid.
      schema:
        type: integer
        format: int64
        minimum: 1
    BidPosition:
      name: position
      in: path
      required: true
      description: One-based bid position within the round.
      schema:
        type: integer
        format: int64
        minimum: 1
    Address:
      name: address
      in: path
      required: true
      description: Ethereum wallet address.
      schema:
        type: string
        minLength: 42
        maxLength: 42
        pattern: "^0x[0-9a-fA-F]{40}$"
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque continuation cursor returned by the previous page. Cursors are
        stable positions, not live subscriptions: while paging an open
        collection, newly indexed events ahead of the cursor are visible by
        polling again without a cursor.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    ParticipantCursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque continuation cursor for one ranked participant directory.
        Aggregate ranks can change while a client traverses pages; clients
        should de-duplicate addresses and restart from the first page when
        they need a fresh ranking.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of resources to return.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    RaffleNftPoolParam:
      name: pool
      in: query
      required: true
      description: Select bidder winners or RandomWalk-staker winners.
      schema:
        $ref: "#/components/schemas/RaffleNftPool"
    DepositClaimedFilter:
      name: claimed
      in: query
      required: false
      description: |
        Keep only claimed (true) or unclaimed (false) deposits. Omit the
        parameter for the full ledger.
      schema:
        type: boolean
    DonatedNftStatusFilter:
      name: status
      in: query
      required: false
      description: |
        Keep only claimed or unclaimed donated NFTs. Omit the parameter
        for both.
      schema:
        $ref: "#/components/schemas/DonatedNftStatus"
    StakingDepositClaimedFilter:
      name: claimed
      in: query
      required: false
      description: |
        Keep only fully claimed (true) or still partially pending (false)
        staking deposits. Omit the parameter for the full ledger.
      schema:
        type: boolean
    StakingDepositId:
      name: depositId
      in: path
      required: true
      description: Contract-assigned staking deposit identifier.
      schema:
        type: integer
        format: int64
        minimum: 0
    StakingActionId:
      name: actionId
      in: path
      required: true
      description: Contract-assigned staking action identifier.
      schema:
        type: integer
        format: int64
        minimum: 0
    StakerRafflePoolParam:
      name: pool
      in: query
      required: true
      description: Select Cosmic Signature NFT stakers or RandomWalk NFT stakers.
      schema:
        $ref: "#/components/schemas/StakerRafflePool"
    StakedNftTokenId:
      name: nftTokenId
      in: path
      required: true
      description: Cosmic Signature NFT token identifier.
      schema:
        type: integer
        format: int64
        minimum: 0
    NamedTokensFilter:
      name: named
      in: query
      required: false
      description: |
        When true, keep only tokens that currently hold a non-empty name.
        Mutually exclusive with `name`.
      schema:
        type: boolean
    TokenNameSearch:
      name: name
      in: query
      required: false
      description: |
        Keep only tokens whose current name contains this term
        case-insensitively. Mutually exclusive with `named`.
      schema:
        type: string
        minLength: 1
        maxLength: 64
    SupplyDailyFrom:
      name: from
      in: query
      required: true
      description: Inclusive first UTC calendar day of the window.
      schema:
        type: string
        format: date
    SupplyDailyTo:
      name: to
      in: query
      required: true
      description: Exclusive UTC calendar day ending the window.
      schema:
        type: string
        format: date
    RoiSortParam:
      name: sort
      in: query
      required: false
      description: Metric used to order the ROI leaderboard.
      schema:
        $ref: "#/components/schemas/RoiLeaderboardSort"
        default: netProfit
    MinBids:
      name: minBids
      in: query
      required: false
      description: Minimum lifetime bid count required for leaderboard inclusion.
      schema:
        type: integer
        minimum: 0
        default: 5
    AnalyticsFrom:
      name: from
      in: query
      required: true
      description: Inclusive beginning of the analytics window as Unix seconds.
      schema:
        type: integer
        format: int64
        minimum: 0
        maximum: 253402300799
    AnalyticsTo:
      name: to
      in: query
      required: true
      description: Exclusive end of the analytics window as Unix seconds.
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 253402300799
    AnalyticsTop:
      name: top
      in: query
      required: false
      description: Number of lifetime top bidders whose activity is analyzed.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AnalyticsGapHours:
      name: gapHours
      in: query
      required: false
      description: A larger gap starts a new bidder activity period.
      schema:
        type: integer
        minimum: 1
        maximum: 8760
        default: 6
    AnalyticsMinBids:
      name: minBids
      in: query
      required: false
      description: Minimum number of bids required to retain an activity period.
      schema:
        type: integer
        minimum: 1
        maximum: 1000000
        default: 2
    ClaimTransactionsCursor:
      name: claimTransactionsCursor
      in: query
      required: false
      description: Opaque continuation cursor for the claim-transactions section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    AttachedTokensCursor:
      name: attachedTokensCursor
      in: query
      required: false
      description: Opaque continuation cursor for the attached-tokens section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    UnclaimedItemsCursor:
      name: unclaimedItemsCursor
      in: query
      required: false
      description: Opaque continuation cursor for the unclaimed-items section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    RandomWalkTokenId:
      name: tokenId
      in: path
      required: true
      description: RandomWalk NFT token identifier.
      schema:
        type: integer
        format: int64
        minimum: 0
    MintedFrom:
      name: mintedFrom
      in: query
      required: false
      description: Inclusive lower bound on the mint timestamp as Unix seconds.
      schema:
        type: integer
        format: int64
        minimum: 0
        maximum: 253402300799
    MintedUntil:
      name: mintedUntil
      in: query
      required: false
      description: Exclusive upper bound on the mint timestamp as Unix seconds.
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 253402300799
    RandomWalkTokenSortParam:
      name: sort
      in: query
      required: false
      description: Order of the RandomWalk token directory.
      schema:
        $ref: "#/components/schemas/RandomWalkTokenSort"
        default: tokenId
    RandomWalkOfferSortParam:
      name: sort
      in: query
      required: false
      description: Order of the live order book.
      schema:
        $ref: "#/components/schemas/RandomWalkOfferSort"
        default: newest
    RankingSampleSize:
      name: sampleSize
      in: query
      required: false
      description: Number of exploration token ids to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 2
    RankingVoter:
      name: voter
      in: query
      required: false
      description: |
        Wallet whose already-voted pairs the selection avoids. A valid
        wallet the indexer has never seen behaves like an omitted
        parameter.
      schema:
        type: string
        minLength: 42
        maxLength: 42
        pattern: "^0x[0-9a-fA-F]{40}$"
  securitySchemes:
    AdminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: |
        Shared-secret admin key compared in constant time against
        ADMIN_API_KEY. When the variable is unset guarded operations fail
        closed with 503.
    RankingAdminKey:
      type: apiKey
      in: header
      name: X-Ranking-Admin-Key
      description: |
        Shared-secret admin key compared in constant time against
        RANKING_ADMIN_KEY (falling back to ADMIN_API_KEY). When neither
        variable is set the guarded operations fail closed with 503.
  schemas:
    Problem:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
    ContractAddressRegistry:
      type: object
      additionalProperties: false
      required:
        - cosmicGameAddress
        - cosmicSignatureAddress
        - cosmicTokenAddress
        - cosmicDaoAddress
        - charityWalletAddress
        - prizesWalletAddress
        - randomWalkAddress
        - cstStakingWalletAddress
        - randomWalkStakingWalletAddress
        - marketingWalletAddress
        - marketplaceAddress
        - implementationAddress
      properties:
        cosmicGameAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cosmicSignatureAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cosmicTokenAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cosmicDaoAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        charityWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        prizesWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        randomWalkAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cstStakingWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        randomWalkStakingWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        marketingWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        marketplaceAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        implementationAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
    ContractMechanicsVersion:
      type: string
      description: |
        Selects the mechanics-specific fields: v1 uses a fixed CST bid reward
        and auction divisor; v2 uses a dynamic reward multiplier and configured
        auction duration; v3 adds late-bid premiums, split rewards, multi-NFT
        main prizes, and a derived CST auction duration.
      enum:
        - v1
        - v2
        - v3
    CstBidRewardMode:
      type: string
      description: Fixed on v1 mechanics and dynamic on v2/v3 mechanics.
      enum:
        - fixed
        - dynamic
      x-enum-varnames:
        - CstBidRewardFixed
        - CstBidRewardDynamic
    CstRoundStartAuctionMode:
      type: string
      enum:
        - divisor
        - durationSeconds
    ContractConfiguration:
      type: object
      additionalProperties: false
      oneOf:
        - title: V1 contract configuration
          required:
            - fixedCstBidRewardWei
          properties:
            mechanicsVersion:
              type: string
              enum: [v1]
            cstBidRewardMode:
              type: string
              enum: [fixed]
            cstRoundStartAuctionMode:
              type: string
              enum: [divisor]
          not:
            anyOf:
              - required: [cstBidRewardMultiplier]
              - required: [cstDutchAuctionDurationChangeDivisor]
        - title: V2 contract configuration
          required:
            - cstBidRewardMultiplier
            - cstDutchAuctionDurationChangeDivisor
          properties:
            mechanicsVersion:
              type: string
              enum: [v2]
            cstBidRewardMode:
              type: string
              enum: [dynamic]
            cstRoundStartAuctionMode:
              type: string
              enum: [durationSeconds]
          not:
            required: [fixedCstBidRewardWei]
        - title: V3 contract configuration
          required:
            - cstBidRewardMultiplier
            - cstDutchAuctionDurationChangeDivisor
            - roundLateBidDurationDivisor
            - roundLateBidDurationSeconds
            - roundLateBidPricePremiumAmountBaseMultiplier
            - roundLateBidPricePremiumAmountExponent
            - lastBidderBidCstRewardAmountPercentage
            - mainPrizeNumCosmicSignatureNfts
            - cstDutchAuctionBeginningBidPriceMinLimitWei
            - bidCstRewardAmountPerMainPrizeTimeIncrementWei
          properties:
            mechanicsVersion:
              type: string
              enum: [v3]
            cstBidRewardMode:
              type: string
              enum: [dynamic]
            cstRoundStartAuctionMode:
              type: string
              enum: [durationSeconds]
          not:
            required: [fixedCstBidRewardWei]
      required:
        - mechanicsVersion
        - ethBidPriceIncreaseDivisor
        - charityAddress
        - charityDonationPercentage
        - cstBidRewardMode
        - mainPrizePercentage
        - rafflePercentage
        - chronoWarriorPercentage
        - stakingPercentage
        - mainPrizeTimeIncrementIncreaseDivisor
        - raffleEthWinnerCount
        - raffleNftBidderWinnerCount
        - raffleNftRandomWalkStakerWinnerCount
        - initialDurationUntilMainPrizeDivisor
        - timeoutMainPrizeClaimSeconds
        - cstRoundStartAuctionMode
        - cstRoundStartAuctionValue
        - treasurerAddress
      properties:
        mechanicsVersion:
          $ref: "#/components/schemas/ContractMechanicsVersion"
        ethBidPriceIncreaseDivisor:
          type: string
          pattern: "^[0-9]+$"
        charityAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        treasurerAddress:
          description: The MarketingWallet's owner-tunable treasurer.
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        charityDonationPercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        cstBidRewardMode:
          $ref: "#/components/schemas/CstBidRewardMode"
        fixedCstBidRewardWei:
          type: string
          pattern: "^[0-9]+$"
          description: Present only for v1 mechanics.
        cstBidRewardMultiplier:
          type: string
          pattern: "^[0-9]+$"
          description: Present for v2 and v3 mechanics.
        mainPrizePercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        rafflePercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        chronoWarriorPercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        stakingPercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        mainPrizeTimeIncrementIncreaseDivisor:
          type: string
          pattern: "^[0-9]+$"
        raffleEthWinnerCount:
          type: integer
          format: int64
          minimum: 0
        raffleNftBidderWinnerCount:
          type: integer
          format: int64
          minimum: 0
        raffleNftRandomWalkStakerWinnerCount:
          type: integer
          format: int64
          minimum: 0
        initialDurationUntilMainPrizeDivisor:
          type: integer
          format: int64
          minimum: 1
        timeoutMainPrizeClaimSeconds:
          type: integer
          format: int64
          minimum: 0
        cstRoundStartAuctionMode:
          $ref: "#/components/schemas/CstRoundStartAuctionMode"
        cstRoundStartAuctionValue:
          type: integer
          format: int64
          minimum: 1
        cstDutchAuctionDurationChangeDivisor:
          type: integer
          format: int64
          minimum: 1
          description: Present for v2 and v3 mechanics.
        roundLateBidDurationDivisor:
          type: string
          pattern: "^[0-9]+$"
          description: V3-only late-bid duration divisor.
        roundLateBidDurationSeconds:
          type: integer
          format: int64
          minimum: 1
          description: V3-only derived late-bid window.
        roundLateBidPricePremiumAmountBaseMultiplier:
          type: string
          pattern: "^[0-9]+$"
          description: V3-only late-bid premium base multiplier.
        roundLateBidPricePremiumAmountExponent:
          type: integer
          format: int64
          minimum: 0
          description: V3-only late-bid premium exponent.
        lastBidderBidCstRewardAmountPercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
          description: V3-only share paid to the outbid previous-last bidder.
        mainPrizeNumCosmicSignatureNfts:
          type: integer
          format: int64
          minimum: 1
          description: Number of sequential NFTs in a V3 main prize.
        cstDutchAuctionBeginningBidPriceMinLimitWei:
          type: string
          pattern: "^[0-9]+$"
          description: V3-only derived CST auction restart floor.
        bidCstRewardAmountPerMainPrizeTimeIncrementWei:
          type: string
          pattern: "^[0-9]+$"
          description: V3-only CST reward accrued per main-prize time increment.
    ContractBalances:
      type: object
      additionalProperties: false
      required:
        - cosmicGameBalanceWei
        - charityAddress
        - charityBalanceWei
      properties:
        cosmicGameBalanceWei:
          type: string
          pattern: "^[0-9]+$"
        charityAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        charityBalanceWei:
          type: string
          pattern: "^[0-9]+$"
    CurrentBidPrices:
      type: object
      additionalProperties: false
      required:
        - nextEthBidPriceWei
        - nextCstBidPriceWei
        - nextCstBidRewardWei
        - ethAuctionDurationSeconds
        - ethAuctionElapsedSeconds
        - cstAuctionDurationSeconds
        - cstAuctionElapsedSeconds
      properties:
        nextEthBidPriceWei:
          type: string
          pattern: "^[0-9]+$"
        nextCstBidPriceWei:
          type: string
          pattern: "^[0-9]+$"
        nextCstBidRewardWei:
          type: string
          pattern: "^[0-9]+$"
          description: Fixed V1 reward or the computed reward for the next V2 bid.
        ethAuctionDurationSeconds:
          type: integer
          format: int64
          minimum: 0
        ethAuctionElapsedSeconds:
          type: integer
          format: int64
          minimum: 0
        cstAuctionDurationSeconds:
          type: integer
          format: int64
          minimum: 0
        cstAuctionElapsedSeconds:
          type: integer
          format: int64
          minimum: 0
    EnduranceChampionStanding:
      type: object
      additionalProperties: false
      required:
        - address
