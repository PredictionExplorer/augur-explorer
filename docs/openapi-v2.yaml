        - tradeCount
        - tradingVolumeWei
        - activeSellOfferCount
        - activeBuyOfferCount
      properties:
        tradeCount:
          type: integer
          format: int64
          minimum: 0
        tradingVolumeWei:
          type: string
          pattern: "^[0-9]+$"
        activeSellOfferCount:
          type: integer
          format: int64
          minimum: 0
        activeBuyOfferCount:
          type: integer
          format: int64
          minimum: 0
    RandomWalkLatestWithdrawal:
