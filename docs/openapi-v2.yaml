        - $ref: "#/components/parameters/AttachedTokensCursor"
        - $ref: "#/components/parameters/UnclaimedItemsCursor"
      responses:
        "200":
          $ref: "#/components/responses/RoundClaimsDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/tokens:
    get:
      operationId: listRandomWalkTokens
      summary: List every minted RandomWalk NFT
      description: |
        Returns the RandomWalk mint directory with each token's mint
        provenance and live owner, name and trading state. The default
        `tokenId` sort ascends the immutable mint order, so pages are
        stable; `mostTraded` ranks by live trade count and ranks can move
        while a client traverses pages. `named=true` keeps only tokens
        that currently hold a name; `name=` keeps tokens whose current
        name contains the term case-insensitively — the two filters are
        mutually exclusive. `mintedFrom`/`mintedUntil` bound the mint
        timestamp as a half-open Unix-second window. Continuation cursors
        are bound to the requested filters and sort.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/NamedTokensFilter"
        - $ref: "#/components/parameters/TokenNameSearch"
        - $ref: "#/components/parameters/MintedFrom"
        - $ref: "#/components/parameters/MintedUntil"
        - $ref: "#/components/parameters/RandomWalkTokenSortParam"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkTokenPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/tokens/{tokenId}:
    get:
      operationId: getRandomWalkToken
      summary: Get one RandomWalk NFT
      description: |
        Returns the token's mint provenance plus its live owner, name and
        exact trading state. Unknown tokens answer 404.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/RandomWalkTokenId"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkTokenDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/tokens/{tokenId}/name-history:
    get:
      operationId: listRandomWalkTokenNameHistory
      summary: List one RandomWalk NFT's renames
      description: |
        Returns the token's naming events newest first by immutable
        event-log ID. An empty `newName` records a cleared name. Unknown
        tokens answer 404; a minted token that was never named returns an
        empty page.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/RandomWalkTokenId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkTokenNameChangePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/tokens/{tokenId}/events:
    get:
      operationId: listRandomWalkTokenEvents
      summary: List one RandomWalk NFT's provenance events
      description: |
        Returns the token's interleaved history newest first by immutable
        event-log ID: mint, ownership transfers, renames, marketplace
        listings, listing cancellations and purchases. Transfers that
        merely mirror the mint or a purchase in the same transaction are
        represented once, by the mint or purchase event. Each row carries
        exactly the optional fields its `eventType` implies. Unknown
        tokens answer 404.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/RandomWalkTokenId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkTokenEventPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/marketplace/offers:
    get:
      operationId: listRandomWalkMarketplaceOffers
      summary: List the live RandomWalk marketplace order book
      description: |
        Returns currently active sell and buy offers. Offers leave the
        book when bought or canceled, so rows can disappear while a
        client traverses pages; clients needing a fresh snapshot restart
        from the first page. Continuation cursors are bound to the
        requested sort.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/RandomWalkOfferSortParam"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkMarketplaceOfferPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/marketplace/offer-history:
    get:
      operationId: listRandomWalkMarketplaceOfferHistory
      summary: List every RandomWalk marketplace offer ever created
      description: |
        Returns the immutable offer-creation ledger newest first by
        event-log ID. Each row carries the offer's current outcome: an
        active offer, the purchase that filled it, or its cancellation.
        `sellerProfitWei` is present when the marketplace tracked the
        seller's position for a filled sell offer.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkOfferHistoryPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/marketplace/trades:
    get:
      operationId: listRandomWalkMarketplaceTrades
      summary: List completed RandomWalk marketplace purchases
      description: |
        Returns the purchase ledger newest first by the purchase event's
        immutable event-log ID, with the filled offer, exact price and
        both trading parties.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkTradePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/marketplace/floor-price:
    get:
      operationId: getRandomWalkMarketplaceFloorPrice
      summary: Get the cheapest active RandomWalk sell offer
      description: |
        Returns the current sell-side floor. `floor` is present exactly
        when at least one sell offer is active; an empty book is a valid
        200 with a zero count.
      tags:
        - RandomWalk
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkFloorPrice"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/users/{address}:
    get:
      operationId: getRandomWalkUser
      summary: Get one wallet's RandomWalk activity profile
      description: |
        Returns exact minting, trading and withdrawal statistics plus the
        wallet's live owned-token count. A valid wallet the indexer has
        never seen returns the same shape with zero values.
      tags:
        - RandomWalk
      parameters:
        - $ref: "#/components/parameters/Address"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkUserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/randomwalk/users/{address}/tokens:
    get:
