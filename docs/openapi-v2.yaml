  /api/v2/cosmicgame/users/{address}/cosmic-token-summary:
    get:
      operationId: getCosmicGameUserCosmicTokenSummary
      summary: Get one wallet's Cosmic Token position
      description: |
        Returns the wallet's exact Cosmic Token (ERC-20) position from
        one consistent database snapshot: the indexed balance, earnings
        by source, the amount consumed in CST bids, the resulting signed
        net game flow and the wallet's transfer activity counters. All
        amounts are exact base-unit strings. A valid wallet without
        indexed activity returns the all-zero shape.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
