  /api/v2/cosmicgame/users/{address}/staking/cst/deposits/{depositId}/rewards:
    get:
      operationId: listCosmicGameUserStakingDepositRewards
      summary: List one wallet's per-token rewards inside one staking deposit
      description: |
        Returns the wallet's smallest reward units of one staking deposit
