      tags:
        - CosmicGame statistics
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameGlobalStatistics"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/counters:
    get:
      operationId: getCosmicGameCounters
      summary: Get canonical CosmicGame record counters
      tags:
        - CosmicGame statistics
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCounters"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/activity:
    get:
      operationId: getCosmicGameBiddingActivity
      summary: Get bounded bid-frequency analytics with detected spikes
      description: |
        Returns UTC/anchor-aligned frequency buckets after excluding bids made
        during the first hour of a round. Above-normal contiguous buckets are
        merged into spikes. A recent spike is one whose start falls in the
        30-day window ending at the server's current time.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one hour.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 3600
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingActivity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/frequency:
    get:
      operationId: getCosmicGameBiddingFrequency
      summary: Get bounded bid-frequency buckets
      description: |
        Bids in the first hour after each round opens are excluded. One-hour
        and one-day buckets align to UTC epoch boundaries; other widths anchor
        at `from`.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one day.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 86400
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingFrequency"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/type-ratio:
    get:
      operationId: getCosmicGameBiddingTypeRatio
      summary: Get bounded bid-type composition buckets
      description: |
        Returns raw ETH, RandomWalk and CST bid counts plus deterministic
        decimal-string percentages for a 100-percent stacked chart. Unlike
        activity/frequency, this composition includes bids from the first
        hour after a round opens.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one day.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 86400
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingTypeRatio"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/top-active-periods:
    get:
      operationId: getCosmicGameBiddingTopActivePeriods
      summary: Get active periods for the lifetime top bidders
      description: |
        Ranks bidders by lifetime bid count, then segments their bids inside
        `[from,to)` into periods separated by more than `gapHours`. Results
        are limited to 2,000 periods; broader filters return 400 so clients
        can narrow the window or increase `gapHours` or `minBids`.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - $ref: "#/components/parameters/AnalyticsTop"
        - $ref: "#/components/parameters/AnalyticsGapHours"
        - $ref: "#/components/parameters/AnalyticsMinBids"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingTopActivePeriods"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/time-bounds:
