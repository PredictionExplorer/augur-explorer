    get:
      operationId: getCosmicGameCosmicSignatureToken
      summary: Get one Cosmic Signature NFT
      description: |
        Returns one minted token's provenance, current owner, current
        name and live staking state. While the token sits in the staking
        wallet the response carries the locking stake action and the
        staker; round-level prize data lives on the round resources.
      tags:
        - CosmicGame tokens
      parameters:
        - $ref: "#/components/parameters/StakedNftTokenId"
