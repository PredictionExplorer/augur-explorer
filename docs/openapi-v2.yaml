        - rewardWei
        - claimed
      properties:
        actionId:
          type: integer
          format: int64
          minimum: 0
        nftTokenId:
          type: integer
          format: int64
          minimum: 0
        rewardWei:
          type: string
          pattern: "^[0-9]+$"
        claimed:
          type: boolean
