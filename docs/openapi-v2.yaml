        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/StakingDepositId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
