      description: |
        Returns the wallet's interleaved Cosmic Signature NFT stake and
        unstake events newest first by immutable event-log ID. Unstake
        items carry the exact reward collected by that unstake
        transaction; stake items never do. A valid wallet with no indexed
        staking activity returns an empty page.
