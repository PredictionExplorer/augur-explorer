    get:
      operationId: listCosmicGameGlobalStakerRaffleNftWins
      summary: List Cosmic Signature NFTs won by staking raffles
      description: |
        Returns global staker-raffle NFT wins newest first by immutable
        event-log ID. `pool=cst` selects Cosmic Signature NFT stakers and
        `pool=randomWalk` selects RandomWalk NFT stakers. Cursors are bound
        to the selected pool and cannot cross between them.
      tags:
        - CosmicGame staking
      parameters:
        - $ref: "#/components/parameters/StakerRafflePoolParam"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameGlobalStakerRaffleNftWinPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/cosmic-signature-tokens:
    get:
      operationId: listCosmicGameCosmicSignatureTokens
      summary: List every minted Cosmic Signature NFT
      description: |
        Returns the global Cosmic Signature token directory, newest mint
        first by immutable token ID, with each token's mint provenance
        (round, prize source, original winner, seed), current owner,
        current name and live staking-wallet membership. `named=true`
        keeps only tokens that currently hold a name; `name=` keeps only
        tokens whose current name contains the term case-insensitively.
        The two filters are mutually exclusive and each continuation
        cursor is bound to its filter. Mints are append-only, so pages
        are stable; the owner, name and staking columns are live and may
        change between pages.
      tags:
        - CosmicGame tokens
      parameters:
        - $ref: "#/components/parameters/NamedTokensFilter"
        - $ref: "#/components/parameters/TokenNameSearch"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCosmicSignatureTokenPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/cosmic-signature-tokens/holders:
    get:
      operationId: listCosmicGameCosmicSignatureHolders
      summary: List wallets by Cosmic Signature NFTs currently held
      description: |
        Returns the ownership distribution of the Cosmic Signature
        collection: one row per wallet that currently holds at least one
        token, largest holding first with an internal stable tie-break.
        Holdings change on every transfer, so ranks can move while a
        client traverses pages; clients should de-duplicate addresses
        and restart from the first page when they need a fresh ranking.
      tags:
        - CosmicGame tokens
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCosmicSignatureHolderPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
