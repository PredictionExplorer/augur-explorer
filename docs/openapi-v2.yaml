    RandomWalkWithdrawal:
      description: One exact mint-pool withdrawal.
      type: object
      additionalProperties: false
      required:
        - eventLogId
        - blockNumber
        - transactionHash
        - occurredAt
        - withdrawerAddress
        - nftTokenId
        - amountWei
      properties:
        eventLogId:
          type: integer
          format: int64
          minimum: 1
        blockNumber:
          type: integer
          format: int64
          minimum: 0
        transactionHash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        occurredAt:
          type: string
          format: date-time
        withdrawerAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        nftTokenId:
          description: The last minted token at withdrawal time.
          type: integer
          format: int64
          minimum: 0
        amountWei:
          type: string
          pattern: "^[0-9]+$"
    RandomWalkWithdrawalPage:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RandomWalkWithdrawal"
        meta:
          $ref: "#/components/schemas/PageMeta"
    RandomWalkContractAddresses:
      type: object
      additionalProperties: false
      required:
        - nftAddress
