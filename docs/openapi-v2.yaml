        mintCount:
          type: integer
          format: int64
          minimum: 1
        mintedWei:
          type: string
          pattern: "^[0-9]+$"
        cumulativeMintedWei:
          description: Exact running total through the end of this month.
          type: string
          pattern: "^[0-9]+$"
    RandomWalkMintReport:
      type: object
      additionalProperties: false
      required:
        - months
      properties:
        months:
          type: array
          maxItems: 2000
          items:
