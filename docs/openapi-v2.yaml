openapi: 3.0.3
info:
  title: RWCG Backend API v2
  version: 0.11.0
  description: |
    Resource-oriented API for RandomWalk and CosmicGame. V2 is introduced
    incrementally while the frozen v1 contract remains available.
servers:
  - url: /
paths:
  /api/v2/cosmicgame/contracts/addresses:
    get:
      operationId: getCosmicGameContractAddresses
      summary: Get the deployed CosmicGame contract registry
      description: |
        Returns the complete database-backed CosmicGame registry plus the
        RandomWalk marketplace registry entry. Addresses are canonical, an
        incomplete registry is an internal error, and the response performs
        no contract RPC.
      tags:
        - CosmicGame contracts
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameContractAddresses"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/contracts/configuration:
    get:
      operationId: getCosmicGameContractConfiguration
      summary: Get cached CosmicGame contract configuration
      description: |
        Returns a mechanics-consistent cache snapshot of owner-tunable
        parameters. Constants refresh every five minutes; dependent live
        timing fields refresh every five seconds. The handler never performs
        request-time RPC.
      tags:
        - CosmicGame contracts
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameContractConfiguration"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/contracts/balances:
    get:
      operationId: getCosmicGameContractBalances
      summary: Get cached CosmicGame and charity ETH balances
      description: Exact wei balances from one block-pinned five-second cache refresh; no request-time RPC.
      tags:
        - CosmicGame contracts
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameContractBalances"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds:
    get:
      operationId: listRounds
      summary: List completed CosmicGame rounds
      tags:
        - CosmicGame rounds
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/current:
    get:
      operationId: getCurrentRound
      summary: Get the current open CosmicGame round
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentRound"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/current/bid-prices:
    get:
      operationId: getCosmicGameCurrentBidPrices
      summary: Get cached next-bid prices and Dutch-auction progress
      description: |
        Returns exact ETH/CST prices and duration/elapsed values from one
        block-pinned five-second cache refresh. Auction progress is clamped
        to the inclusive range from zero through duration. The handler never
        performs request-time RPC.
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentBidPrices"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/current/special-winners:
    get:
      operationId: getCosmicGameCurrentSpecialWinners
      summary: Get cached live endurance and chrono-warrior standings
      description: |
        Returns block-coherent special-winner standings from the 30-second
        cache. Cache refresh combines block-pinned contract reads with a
        best-effort database lookup for the last CST bid event ID; a missing
        event omits that optional field. The handler never performs
        request-time RPC.
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentSpecialWinners"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/{round}:
    get:
      operationId: getRound
      summary: Get one completed CosmicGame round
      tags:
        - CosmicGame rounds
      parameters:
        - $ref: "#/components/parameters/Round"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameRound"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/bids:
    get:
      operationId: listRoundBids
      summary: List bids in one CosmicGame round
      tags:
        - CosmicGame bids
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundBidPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/bids/{position}:
    get:
      operationId: getRoundBid
      summary: Get one bid by its position in a CosmicGame round
      tags:
        - CosmicGame bids
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/BidPosition"
      responses:
        "200":
          $ref: "#/components/responses/Bid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/prizes:
    get:
      operationId: listRoundPrizes
      summary: List prizes awarded in one completed CosmicGame round
      tags:
        - CosmicGame prizes
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundPrizePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/raffle-eth-deposits:
    get:
      operationId: listRoundRaffleEthDeposits
      summary: List bidder raffle ETH wallet deposits in one completed round
      tags:
        - CosmicGame raffles
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundRaffleEthDepositPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/raffle-nft-winners:
    get:
      operationId: listRoundRaffleNftWinners
      summary: List raffle NFT winners in one completed round
      tags:
        - CosmicGame raffles
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/RaffleNftPoolParam"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundRaffleNftWinnerPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/eth-donations:
    get:
      operationId: listRoundEthDonations
      summary: List direct ETH donations made during one round
      description: |
        Returns plain and info-carrying direct donations in newest-first event
        order. Donations are available while a round is open; a nonnegative
        round without donation records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundEthDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/erc20-donations:
    get:
      operationId: listRoundErc20Donations
      summary: List ERC-20 donations made during one round
      description: |
        Returns donation events in newest-first event order. Token amounts are
        exact base-unit integers because arbitrary ERC-20 tokens need not use
        18 decimals. A nonnegative round without records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundErc20DonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/nft-donations:
    get:
      operationId: listRoundNftDonations
      summary: List NFT donations made during one round
      description: |
        Returns donation events in newest-first event order. A nonnegative
        round without records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundNftDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}:
    get:
      operationId: getCosmicGameUser
      summary: Get an exact CosmicGame activity profile for one wallet
      description: |
        Returns a bounded aggregate profile without inline history arrays or
        request-time contract RPC. A syntactically valid wallet that has not
        been indexed yet returns the same zero-activity shape with its
        checksummed address.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/bids:
    get:
      operationId: listCosmicGameUserBids
      summary: List bids made by one wallet
      description: |
        Returns bids newest first by immutable event-log ID. A cursor is
        scoped to the normalized wallet and cannot be reused for another
        user. A valid wallet with no indexed bids returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserBidPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics:
    get:
      operationId: getCosmicGameStatistics
      summary: Get exact global CosmicGame statistics
      tags:
        - CosmicGame statistics
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameGlobalStatistics"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/counters:
    get:
      operationId: getCosmicGameCounters
      summary: Get canonical CosmicGame record counters
      tags:
        - CosmicGame statistics
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCounters"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/activity:
    get:
      operationId: getCosmicGameBiddingActivity
      summary: Get bounded bid-frequency analytics with detected spikes
      description: |
        Returns UTC/anchor-aligned frequency buckets after excluding bids made
        during the first hour of a round. Above-normal contiguous buckets are
        merged into spikes. A recent spike is one whose start falls in the
        30-day window ending at the server's current time.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one hour.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 3600
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingActivity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/frequency:
    get:
      operationId: getCosmicGameBiddingFrequency
      summary: Get bounded bid-frequency buckets
      description: |
        Bids in the first hour after each round opens are excluded. One-hour
        and one-day buckets align to UTC epoch boundaries; other widths anchor
        at `from`.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one day.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 86400
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingFrequency"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/type-ratio:
    get:
      operationId: getCosmicGameBiddingTypeRatio
      summary: Get bounded bid-type composition buckets
      description: |
        Returns raw ETH, RandomWalk and CST bid counts plus deterministic
        decimal-string percentages for a 100-percent stacked chart. Unlike
        activity/frequency, this composition includes bids from the first
        hour after a round opens.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one day.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 86400
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingTypeRatio"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/top-active-periods:
    get:
      operationId: getCosmicGameBiddingTopActivePeriods
      summary: Get active periods for the lifetime top bidders
      description: |
        Ranks bidders by lifetime bid count, then segments their bids inside
        `[from,to)` into periods separated by more than `gapHours`. Results
        are limited to 2,000 periods; broader filters return 400 so clients
        can narrow the window or increase `gapHours` or `minBids`.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - $ref: "#/components/parameters/AnalyticsTop"
        - $ref: "#/components/parameters/AnalyticsGapHours"
        - $ref: "#/components/parameters/AnalyticsMinBids"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingTopActivePeriods"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/time-bounds:
    get:
      operationId: getCosmicGameBiddingTimeBounds
      summary: Get the first and last indexed bid timestamps
      tags:
        - CosmicGame statistics
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingTimeBounds"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/bidders:
    get:
      operationId: listCosmicGameBidders
      summary: List CosmicGame bidders by bid count
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/BidderParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/winners:
    get:
      operationId: listCosmicGameWinners
      summary: List CosmicGame prize winners by prize count
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/WinnerParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/donors:
    get:
      operationId: listCosmicGameDonors
      summary: List CosmicGame ETH donors by donated amount
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/DonorParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/stakers/cst:
    get:
      operationId: listCosmicGameCstStakers
      summary: List Cosmic Signature Token stakers by earned reward
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CstStakerParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/stakers/random-walk:
    get:
      operationId: listCosmicGameRandomWalkStakers
      summary: List RandomWalk NFT stakers by current staked-token count
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkStakerParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/stakers/both:
    get:
      operationId: listCosmicGameDualStakers
      summary: List addresses currently staking both NFT families
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/DualStakerParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/leaderboard/roi:
    get:
      operationId: listCosmicGameRoiLeaderboard
      summary: List the CosmicGame ROI leaderboard
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/RoiSortParam"
        - $ref: "#/components/parameters/MinBids"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoiLeaderboardPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/claims:
    get:
      operationId: listCosmicGameClaims
      summary: List claimable-asset summaries by completed round
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/ClaimSummaryPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/claims:
    get:
      operationId: getRoundClaims
      summary: Get bounded claim details for one completed round
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/ClaimTransactionsCursor"
        - $ref: "#/components/parameters/AttachedTokensCursor"
        - $ref: "#/components/parameters/UnclaimedItemsCursor"
      responses:
        "200":
          $ref: "#/components/responses/RoundClaimsDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  parameters:
    Round:
      name: round
      in: path
      required: true
      description: Zero-based CosmicGame round number.
      schema:
        type: integer
        format: int64
        minimum: 0
    BidPosition:
      name: position
      in: path
      required: true
      description: One-based bid position within the round.
      schema:
        type: integer
        format: int64
        minimum: 1
    Address:
      name: address
      in: path
      required: true
      description: Ethereum wallet address.
      schema:
        type: string
        minLength: 42
        maxLength: 42
        pattern: "^0x[0-9a-fA-F]{40}$"
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque continuation cursor returned by the previous page. Cursors are
        stable positions, not live subscriptions: while paging an open
        collection, newly indexed events ahead of the cursor are visible by
        polling again without a cursor.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    ParticipantCursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque continuation cursor for one ranked participant directory.
        Aggregate ranks can change while a client traverses pages; clients
        should de-duplicate addresses and restart from the first page when
        they need a fresh ranking.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of resources to return.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    RaffleNftPoolParam:
      name: pool
      in: query
      required: true
      description: Select bidder winners or RandomWalk-staker winners.
      schema:
        $ref: "#/components/schemas/RaffleNftPool"
    RoiSortParam:
      name: sort
      in: query
      required: false
      description: Metric used to order the ROI leaderboard.
      schema:
        $ref: "#/components/schemas/RoiLeaderboardSort"
        default: netProfit
    MinBids:
      name: minBids
      in: query
      required: false
      description: Minimum lifetime bid count required for leaderboard inclusion.
      schema:
        type: integer
        minimum: 0
        default: 5
    AnalyticsFrom:
      name: from
      in: query
      required: true
      description: Inclusive beginning of the analytics window as Unix seconds.
      schema:
        type: integer
        format: int64
        minimum: 0
        maximum: 253402300799
    AnalyticsTo:
      name: to
      in: query
      required: true
      description: Exclusive end of the analytics window as Unix seconds.
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 253402300799
    AnalyticsTop:
      name: top
      in: query
      required: false
      description: Number of lifetime top bidders whose activity is analyzed.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AnalyticsGapHours:
      name: gapHours
      in: query
      required: false
      description: A larger gap starts a new bidder activity period.
      schema:
        type: integer
        minimum: 1
        maximum: 8760
        default: 6
    AnalyticsMinBids:
      name: minBids
      in: query
      required: false
      description: Minimum number of bids required to retain an activity period.
      schema:
        type: integer
        minimum: 1
        maximum: 1000000
        default: 2
    ClaimTransactionsCursor:
      name: claimTransactionsCursor
      in: query
      required: false
      description: Opaque continuation cursor for the claim-transactions section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    AttachedTokensCursor:
      name: attachedTokensCursor
      in: query
      required: false
      description: Opaque continuation cursor for the attached-tokens section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    UnclaimedItemsCursor:
      name: unclaimedItemsCursor
      in: query
      required: false
      description: Opaque continuation cursor for the unclaimed-items section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
  schemas:
    Problem:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
    ContractAddressRegistry:
      type: object
      additionalProperties: false
      required:
        - cosmicGameAddress
        - cosmicSignatureAddress
        - cosmicTokenAddress
        - cosmicDaoAddress
        - charityWalletAddress
        - prizesWalletAddress
        - randomWalkAddress
        - cstStakingWalletAddress
        - randomWalkStakingWalletAddress
        - marketingWalletAddress
        - marketplaceAddress
        - implementationAddress
      properties:
        cosmicGameAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cosmicSignatureAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cosmicTokenAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cosmicDaoAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        charityWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        prizesWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        randomWalkAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cstStakingWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        randomWalkStakingWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        marketingWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        marketplaceAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        implementationAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
    ContractMechanicsVersion:
      type: string
      description: |
        Selects the mechanics-specific fields: v1 uses a fixed CST bid reward
        and auction divisor; v2 uses a dynamic reward multiplier, auction
        duration, and duration-change divisor.
      enum:
        - v1
        - v2
    CstBidRewardMode:
      type: string
      description: Fixed on v1 mechanics and dynamic on v2 mechanics.
      enum:
        - fixed
        - dynamic
      x-enum-varnames:
        - CstBidRewardFixed
        - CstBidRewardDynamic
    CstRoundStartAuctionMode:
      type: string
      enum:
        - divisor
        - durationSeconds
    ContractConfiguration:
      type: object
      additionalProperties: false
      oneOf:
        - title: V1 contract configuration
          required:
            - fixedCstBidRewardWei
          properties:
            mechanicsVersion:
              type: string
              enum: [v1]
            cstBidRewardMode:
              type: string
              enum: [fixed]
            cstRoundStartAuctionMode:
              type: string
              enum: [divisor]
          not:
            anyOf:
              - required: [cstBidRewardMultiplier]
              - required: [cstDutchAuctionDurationChangeDivisor]
        - title: V2 contract configuration
          required:
            - cstBidRewardMultiplier
            - cstDutchAuctionDurationChangeDivisor
          properties:
            mechanicsVersion:
              type: string
              enum: [v2]
            cstBidRewardMode:
              type: string
              enum: [dynamic]
            cstRoundStartAuctionMode:
              type: string
              enum: [durationSeconds]
          not:
            required: [fixedCstBidRewardWei]
      required:
        - mechanicsVersion
        - ethBidPriceIncreaseDivisor
        - charityAddress
        - charityDonationPercentage
        - cstBidRewardMode
        - mainPrizePercentage
        - rafflePercentage
        - chronoWarriorPercentage
        - stakingPercentage
        - mainPrizeTimeIncrementIncreaseDivisor
        - raffleEthWinnerCount
        - raffleNftBidderWinnerCount
        - raffleNftRandomWalkStakerWinnerCount
        - initialDurationUntilMainPrizeDivisor
        - timeoutMainPrizeClaimSeconds
        - cstRoundStartAuctionMode
        - cstRoundStartAuctionValue
      properties:
        mechanicsVersion:
          $ref: "#/components/schemas/ContractMechanicsVersion"
        ethBidPriceIncreaseDivisor:
          type: string
          pattern: "^[0-9]+$"
        charityAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        charityDonationPercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        cstBidRewardMode:
          $ref: "#/components/schemas/CstBidRewardMode"
        fixedCstBidRewardWei:
          type: string
          pattern: "^[0-9]+$"
          description: Present only for v1 mechanics.
        cstBidRewardMultiplier:
          type: string
          pattern: "^[0-9]+$"
          description: Present only for v2 mechanics.
        mainPrizePercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        rafflePercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        chronoWarriorPercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        stakingPercentage:
          type: integer
          format: int64
          minimum: 0
          maximum: 100
        mainPrizeTimeIncrementIncreaseDivisor:
          type: string
          pattern: "^[0-9]+$"
        raffleEthWinnerCount:
          type: integer
          format: int64
          minimum: 0
        raffleNftBidderWinnerCount:
          type: integer
          format: int64
          minimum: 0
        raffleNftRandomWalkStakerWinnerCount:
          type: integer
          format: int64
          minimum: 0
        initialDurationUntilMainPrizeDivisor:
          type: integer
          format: int64
          minimum: 1
        timeoutMainPrizeClaimSeconds:
          type: integer
          format: int64
          minimum: 0
        cstRoundStartAuctionMode:
          $ref: "#/components/schemas/CstRoundStartAuctionMode"
        cstRoundStartAuctionValue:
          type: integer
          format: int64
          minimum: 1
        cstDutchAuctionDurationChangeDivisor:
          type: integer
          format: int64
          minimum: 1
          description: Present only for v2 mechanics.
    ContractBalances:
      type: object
      additionalProperties: false
      required:
        - cosmicGameBalanceWei
        - charityAddress
        - charityBalanceWei
      properties:
        cosmicGameBalanceWei:
          type: string
          pattern: "^[0-9]+$"
        charityAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        charityBalanceWei:
          type: string
          pattern: "^[0-9]+$"
    CurrentBidPrices:
      type: object
      additionalProperties: false
      required:
        - nextEthBidPriceWei
        - nextCstBidPriceWei
        - nextCstBidRewardWei
        - ethAuctionDurationSeconds
        - ethAuctionElapsedSeconds
        - cstAuctionDurationSeconds
        - cstAuctionElapsedSeconds
      properties:
        nextEthBidPriceWei:
          type: string
          pattern: "^[0-9]+$"
        nextCstBidPriceWei:
          type: string
          pattern: "^[0-9]+$"
        nextCstBidRewardWei:
          type: string
          pattern: "^[0-9]+$"
          description: Fixed V1 reward or the computed reward for the next V2 bid.
        ethAuctionDurationSeconds:
          type: integer
          format: int64
          minimum: 0
        ethAuctionElapsedSeconds:
          type: integer
          format: int64
          minimum: 0
        cstAuctionDurationSeconds:
          type: integer
          format: int64
          minimum: 0
        cstAuctionElapsedSeconds:
          type: integer
          format: int64
          minimum: 0
    EnduranceChampionStanding:
      type: object
      additionalProperties: false
      required:
        - address
        - durationSeconds
        - startedAt
        - previousDurationSeconds
      properties:
        address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        durationSeconds:
          type: integer
          format: int64
          minimum: 0
        startedAt:
          type: integer
          format: int64
          minimum: 0
        previousDurationSeconds:
          type: integer
          format: int64
          minimum: 0
    ChronoWarriorStanding:
      type: object
      additionalProperties: false
      required:
