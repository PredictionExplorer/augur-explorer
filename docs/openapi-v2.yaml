    UserStakingDeposit:
      description: |
        One wallet's share of one staking-wallet ETH deposit. The exact
        invariant rewardWei = claimedWei + pendingWei always holds;
        stakedNftCount counts the wallet's tokens in the deposit and
        claimedNftCount + pendingNftCount equals it.
      type: object
      additionalProperties: false
      required:
        - eventLogId
        - blockNumber
        - transactionHash
        - occurredAt
        - depositId
        - round
        - totalDepositWei
        - totalStakedNfts
        - amountPerTokenWei
        - stakedNftCount
        - rewardWei
        - claimedWei
        - pendingWei
        - claimedNftCount
        - pendingNftCount
        - fullyClaimed
      properties:
        eventLogId:
          type: integer
          format: int64
          minimum: 1
        blockNumber:
          type: integer
          format: int64
          minimum: 0
        transactionHash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        occurredAt:
          type: string
          format: date-time
        depositId:
          description: Contract-assigned staking deposit identifier.
          type: integer
          format: int64
          minimum: 0
        round:
          type: integer
          format: int64
          minimum: 0
        totalDepositWei:
          description: Pool-wide deposit amount.
          type: string
          pattern: "^[0-9]+$"
        totalStakedNfts:
          description: Pool-wide staked-NFT count the deposit was split over.
          type: integer
          format: int64
          minimum: 1
        amountPerTokenWei:
          description: Exact floor share of one staked NFT.
          type: string
          pattern: "^[0-9]+$"
        stakedNftCount:
          description: The wallet's staked-NFT count inside this deposit.
          type: integer
          format: int64
          minimum: 1
        rewardWei:
          description: The wallet's exact total share of this deposit.
          type: string
          pattern: "^[0-9]+$"
        claimedWei:
          type: string
          pattern: "^[0-9]+$"
        pendingWei:
          type: string
          pattern: "^[0-9]+$"
        claimedNftCount:
          type: integer
          format: int64
          minimum: 0
        pendingNftCount:
          type: integer
          format: int64
          minimum: 0
        fullyClaimed:
          type: boolean
    CosmicGameUserStakingDepositPage:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserStakingDeposit"
        meta:
          $ref: "#/components/schemas/PageMeta"
    UserStakingDepositReward:
      description: |
        The smallest staking reward unit: one wallet's reward for one
        stake action inside one deposit. The reward is collected by the
        token's unstake transaction.
      type: object
      additionalProperties: false
      required:
        - actionId
