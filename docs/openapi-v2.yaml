openapi: 3.0.3
info:
  title: RWCG Backend API v2
  version: 0.7.0
  description: |
    Resource-oriented API for RandomWalk and CosmicGame. V2 is introduced
    incrementally while the frozen v1 contract remains available.
servers:
  - url: /
paths:
  /api/v2/cosmicgame/rounds:
    get:
      operationId: listRounds
      summary: List completed CosmicGame rounds
      tags:
        - CosmicGame rounds
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/current:
    get:
      operationId: getCurrentRound
      summary: Get the current open CosmicGame round
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentRound"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/{round}:
    get:
      operationId: getRound
      summary: Get one completed CosmicGame round
      tags:
        - CosmicGame rounds
      parameters:
        - $ref: "#/components/parameters/Round"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameRound"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/bids:
    get:
      operationId: listRoundBids
      summary: List bids in one CosmicGame round
      tags:
        - CosmicGame bids
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundBidPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/bids/{position}:
    get:
      operationId: getRoundBid
      summary: Get one bid by its position in a CosmicGame round
      tags:
        - CosmicGame bids
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/BidPosition"
      responses:
        "200":
          $ref: "#/components/responses/Bid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/prizes:
    get:
      operationId: listRoundPrizes
      summary: List prizes awarded in one completed CosmicGame round
      tags:
        - CosmicGame prizes
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundPrizePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/raffle-eth-deposits:
    get:
      operationId: listRoundRaffleEthDeposits
      summary: List bidder raffle ETH wallet deposits in one completed round
      tags:
        - CosmicGame raffles
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundRaffleEthDepositPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/raffle-nft-winners:
    get:
      operationId: listRoundRaffleNftWinners
      summary: List raffle NFT winners in one completed round
      tags:
        - CosmicGame raffles
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/RaffleNftPoolParam"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundRaffleNftWinnerPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/eth-donations:
    get:
      operationId: listRoundEthDonations
      summary: List direct ETH donations made during one round
      description: |
        Returns plain and info-carrying direct donations in newest-first event
        order. Donations are available while a round is open; a nonnegative
        round without donation records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundEthDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/erc20-donations:
    get:
      operationId: listRoundErc20Donations
      summary: List ERC-20 donations made during one round
      description: |
        Returns donation events in newest-first event order. Token amounts are
        exact base-unit integers because arbitrary ERC-20 tokens need not use
        18 decimals. A nonnegative round without records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundErc20DonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/nft-donations:
    get:
      operationId: listRoundNftDonations
      summary: List NFT donations made during one round
      description: |
        Returns donation events in newest-first event order. A nonnegative
        round without records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundNftDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics:
    get:
      operationId: getCosmicGameStatistics
      summary: Get exact global CosmicGame statistics
      tags:
        - CosmicGame statistics
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameGlobalStatistics"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/counters:
    get:
      operationId: getCosmicGameCounters
      summary: Get canonical CosmicGame record counters
      tags:
        - CosmicGame statistics
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCounters"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/leaderboard/roi:
    get:
      operationId: listCosmicGameRoiLeaderboard
      summary: List the CosmicGame ROI leaderboard
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/RoiSortParam"
        - $ref: "#/components/parameters/MinBids"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoiLeaderboardPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/claims:
    get:
      operationId: listCosmicGameClaims
      summary: List claimable-asset summaries by completed round
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/ClaimSummaryPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/claims:
    get:
      operationId: getRoundClaims
      summary: Get bounded claim details for one completed round
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/ClaimTransactionsCursor"
        - $ref: "#/components/parameters/AttachedTokensCursor"
        - $ref: "#/components/parameters/UnclaimedItemsCursor"
      responses:
        "200":
          $ref: "#/components/responses/RoundClaimsDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  parameters:
    Round:
      name: round
      in: path
      required: true
      description: Zero-based CosmicGame round number.
      schema:
        type: integer
        format: int64
        minimum: 0
    BidPosition:
      name: position
      in: path
      required: true
      description: One-based bid position within the round.
      schema:
        type: integer
        format: int64
        minimum: 1
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque continuation cursor returned by the previous page. Cursors are
        stable positions, not live subscriptions: while paging an open
        collection, newly indexed events ahead of the cursor are visible by
        polling again without a cursor.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of resources to return.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    RaffleNftPoolParam:
      name: pool
      in: query
      required: true
      description: Select bidder winners or RandomWalk-staker winners.
      schema:
        $ref: "#/components/schemas/RaffleNftPool"
    RoiSortParam:
      name: sort
      in: query
      required: false
      description: Metric used to order the ROI leaderboard.
      schema:
        $ref: "#/components/schemas/RoiLeaderboardSort"
        default: netProfit
    MinBids:
      name: minBids
      in: query
      required: false
      description: Minimum lifetime bid count required for leaderboard inclusion.
      schema:
        type: integer
        minimum: 0
        default: 5
    ClaimTransactionsCursor:
      name: claimTransactionsCursor
      in: query
      required: false
      description: Opaque continuation cursor for the claim-transactions section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    AttachedTokensCursor:
      name: attachedTokensCursor
      in: query
      required: false
      description: Opaque continuation cursor for the attached-tokens section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    UnclaimedItemsCursor:
      name: unclaimedItemsCursor
      in: query
      required: false
      description: Opaque continuation cursor for the unclaimed-items section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
  schemas:
    Problem:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
    RoundStatus:
      type: string
      enum:
        - completed
        - open
    ClaimTransaction:
      type: object
      additionalProperties: false
      required:
        - eventLogId
        - blockNumber
        - transactionHash
        - occurredAt
      properties:
        eventLogId:
          type: integer
          format: int64
          minimum: 1
        blockNumber:
          type: integer
          format: int64
          minimum: 0
        transactionHash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        occurredAt:
          type: string
          format: date-time
    MainPrize:
      type: object
      additionalProperties: false
      required:
        - winnerAddress
        - ethAmountWei
        - nftTokenId
      properties:
        winnerAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        ethAmountWei:
          type: string
          pattern: "^[0-9]+$"
        cstAmountWei:
          type: string
          pattern: "^[0-9]+$"
        nftTokenId:
          type: integer
          format: int64
          minimum: 0
        seed:
          type: string
        secondaryPrizeClaimDeadline:
          type: string
          format: date-time
    RoundStatistics:
      type: object
      additionalProperties: false
      required:
        - totalBids
        - donatedNftCount
        - erc20DonationCount
        - raffleEthDepositsWei
        - raffleNftCount
        - donationCount
        - donationAmountWei
      properties:
        totalBids:
          type: integer
          format: int64
          minimum: 0
        donatedNftCount:
          type: integer
          format: int64
          minimum: 0
        erc20DonationCount:
          type: integer
          format: int64
          minimum: 0
        raffleEthDepositsWei:
          type: string
          pattern: "^[0-9]+$"
        raffleNftCount:
          type: integer
          format: int64
          minimum: 0
        donationCount:
          type: integer
          format: int64
          minimum: 0
        donationAmountWei:
          type: string
          pattern: "^[0-9]+$"
        parameterWindowStartedAt:
          type: string
          format: date-time
        activatedAt:
          type: string
          format: date-time
        parameterWindowDurationSeconds:
          type: integer
          format: int64
          minimum: 0
        roundStartedAt:
          type: string
          format: date-time
        roundEndedAt:
          type: string
          format: date-time
        roundDurationSeconds:
          type: integer
          format: int64
          minimum: 0
    CharityAllocation:
      type: object
      additionalProperties: false
      required:
        - charityAddresses
        - amountWei
      properties:
        charityAddresses:
          type: array
          items:
            type: string
            pattern: "^0x[0-9a-fA-F]{40}$"
        amountWei:
          type: string
          pattern: "^[0-9]+$"
    StakingAllocation:
      type: object
      additionalProperties: false
      required:
        - depositId
        - amountWei
        - amountPerTokenWei
        - stakedTokenCount
      properties:
        depositId:
          type: integer
          format: int64
          minimum: 0
        amountWei:
          type: string
          pattern: "^[0-9]+$"
        amountPerTokenWei:
          type: string
          pattern: "^[0-9]+$"
        stakedTokenCount:
          type: integer
          format: int64
          minimum: 0
    TokenPrize:
      type: object
      additionalProperties: false
      required:
        - winnerAddress
        - nftTokenId
        - cstAmountWei
      properties:
        winnerAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        nftTokenId:
          type: integer
          format: int64
          minimum: 0
        cstAmountWei:
          type: string
          pattern: "^[0-9]+$"
    ChronoWarriorPrize:
      type: object
      additionalProperties: false
      required:
        - winnerAddress
        - ethAmountWei
        - cstAmountWei
        - nftTokenId
      properties:
        winnerAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        ethAmountWei:
          type: string
          pattern: "^[0-9]+$"
        cstAmountWei:
          type: string
          pattern: "^[0-9]+$"
        nftTokenId:
          type: integer
          format: int64
          minimum: 0
    CosmicGameRoundSummary:
      type: object
      additionalProperties: false
      required:
        - round
        - status
        - completedAt
        - mainPrize
        - totalBids
        - donatedNftCount
        - erc20DonationCount
        - raffleEthDepositsWei
        - raffleNftCount
      properties:
        round:
          type: integer
          format: int64
          minimum: 0
        status:
          $ref: "#/components/schemas/RoundStatus"
        completedAt:
          type: string
          format: date-time
        mainPrize:
          $ref: "#/components/schemas/MainPrize"
        totalBids:
          type: integer
          format: int64
          minimum: 0
        donatedNftCount:
          type: integer
          format: int64
          minimum: 0
        erc20DonationCount:
          type: integer
          format: int64
          minimum: 0
        raffleEthDepositsWei:
          type: string
          pattern: "^[0-9]+$"
        raffleNftCount:
          type: integer
          format: int64
          minimum: 0
    CosmicGameRound:
      type: object
      additionalProperties: false
      required:
        - round
        - status
        - claim
        - mainPrize
        - statistics
      properties:
        round:
          type: integer
          format: int64
          minimum: 0
        status:
          $ref: "#/components/schemas/RoundStatus"
        claim:
          $ref: "#/components/schemas/ClaimTransaction"
        mainPrize:
          $ref: "#/components/schemas/MainPrize"
        statistics:
          $ref: "#/components/schemas/RoundStatistics"
        charity:
          $ref: "#/components/schemas/CharityAllocation"
        staking:
          $ref: "#/components/schemas/StakingAllocation"
        enduranceChampion:
          $ref: "#/components/schemas/TokenPrize"
        lastCstBidder:
          $ref: "#/components/schemas/TokenPrize"
        chronoWarrior:
          $ref: "#/components/schemas/ChronoWarriorPrize"
    CosmicGameCurrentRound:
      type: object
      additionalProperties: false
      required:
        - round
        - status
        - nextEthBidPriceWei
        - secondsUntilMainPrize
        - mainPrizeAmountWei
        - rafflePrizeAmountWei
        - stakingRewardAmountWei
        - mainPrizeTimeIncrementMicroseconds
        - statistics
      properties:
        round:
          type: integer
          format: int64
          minimum: 0
        status:
          $ref: "#/components/schemas/RoundStatus"
        nextEthBidPriceWei:
          type: string
          pattern: "^[0-9]+$"
        secondsUntilMainPrize:
          type: integer
          format: int64
          minimum: 0
        mainPrizeAmountWei:
          type: string
          pattern: "^[0-9]+$"
        rafflePrizeAmountWei:
          type: string
          pattern: "^[0-9]+$"
        stakingRewardAmountWei:
          type: string
          pattern: "^[0-9]+$"
        mainPrizeTimeIncrementMicroseconds:
          type: string
          pattern: "^[0-9]+$"
        lastBidderAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        statistics:
          $ref: "#/components/schemas/RoundStatistics"
    RoundPage:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CosmicGameRoundSummary"
        meta:
          $ref: "#/components/schemas/PageMeta"
    RoundPrizeType:
      type: string
      enum:
        - mainPrizeEth
        - mainPrizeCst
        - mainPrizeNft
        - lastCstBidderNft
        - lastCstBidderCst
        - enduranceChampionNft
        - enduranceChampionCst
        - chronoWarriorEth
        - chronoWarriorCst
        - chronoWarriorNft
        - bidderRaffleEth
        - bidderRaffleCst
        - bidderRaffleNft
        - randomWalkStakerRaffleCst
        - randomWalkStakerRaffleNft
        - cosmicSignatureStakingEth
    RoundPrize:
      type: object
      additionalProperties: false
      required:
        - eventLogId
        - blockNumber
        - transactionHash
        - occurredAt
        - round
        - winnerIndex
        - type
      properties:
        eventLogId:
          type: integer
          format: int64
          minimum: 1
        blockNumber:
          type: integer
          format: int64
          minimum: 0
        transactionHash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        occurredAt:
          type: string
          format: date-time
        round:
          type: integer
          format: int64
          minimum: 0
        winnerIndex:
          type: integer
          format: int64
          minimum: 0
        type:
          $ref: "#/components/schemas/RoundPrizeType"
        winnerAddress:
          description: Omitted for the round-wide Cosmic Signature staking allocation.
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        ethAmountWei:
          description: Present only for ETH-denominated prize types.
          type: string
          pattern: "^[0-9]+$"
        cstAmountWei:
          description: Present only for CST-denominated prize types.
          type: string
          pattern: "^[0-9]+$"
        nftTokenId:
          description: Present only for Cosmic Signature NFT prize types.
          type: integer
          format: int64
          minimum: 0
    RoundPrizePage:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RoundPrize"
        meta:
          $ref: "#/components/schemas/PageMeta"
    RoundRaffleEthDeposit:
      type: object
      additionalProperties: false
      required:
        - eventLogId
        - blockNumber
        - transactionHash
        - occurredAt
        - round
        - winnerIndex
        - winnerAddress
        - ethAmountWei
        - claimed
      properties:
        eventLogId:
          type: integer
          format: int64
          minimum: 1
        blockNumber:
          type: integer
          format: int64
          minimum: 0
        transactionHash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        occurredAt:
          type: string
          format: date-time
        round:
          type: integer
          format: int64
          minimum: 0
        winnerIndex:
          type: integer
          format: int64
          minimum: 0
        winnerAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        ethAmountWei:
          type: string
          pattern: "^[0-9]+$"
        claimed:
          type: boolean
    RoundRaffleEthDepositPage:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RoundRaffleEthDeposit"
        meta:
          $ref: "#/components/schemas/PageMeta"
    RaffleNftPool:
      type: string
      enum:
        - bidder
        - randomWalkStaker
    RoundRaffleNftWinner:
      type: object
      additionalProperties: false
      required:
        - eventLogId
        - blockNumber
        - transactionHash
        - occurredAt
        - round
        - winnerIndex
        - winnerAddress
        - nftTokenId
        - cstAmountWei
        - isRandomWalk
      properties:
        eventLogId:
          type: integer
          format: int64
          minimum: 1
        blockNumber:
          type: integer
          format: int64
          minimum: 0
        transactionHash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        occurredAt:
          type: string
          format: date-time
        round:
          type: integer
          format: int64
          minimum: 0
        winnerIndex:
          type: integer
          format: int64
          minimum: 0
        winnerAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        nftTokenId:
          type: integer
          format: int64
          minimum: 0
        cstAmountWei:
          type: string
          pattern: "^[0-9]+$"
        isRandomWalk:
          type: boolean
    RoundRaffleNftWinnerPage:
      type: object
