      description: |
        Returns every ERC-721 transfer of one token — the mint included —
        newest first by immutable event-log ID. The ledger is append-only,
        so pages are stable. An unknown token is 404.
      tags:
        - CosmicGame tokens
      parameters:
        - $ref: "#/components/parameters/StakedNftTokenId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCosmicSignatureTokenTransferPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/cosmic-token/holders:
    get:
      operationId: listCosmicGameCosmicTokenHolders
      summary: List wallets by Cosmic Token balance
      description: |
        Returns every wallet with a positive indexed Cosmic Token (ERC-20)
        balance, largest balance first with an internal stable tie-break,
        as exact base-unit strings. Balances change on every transfer, so
        ranks can move while a client traverses pages; clients should
        de-duplicate addresses and restart from the first page when they
        need a fresh ranking.
      tags:
        - CosmicGame tokens
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCosmicTokenHolderPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/cosmic-token/statistics:
    get:
      operationId: getCosmicGameCosmicTokenStatistics
      summary: Get the global Cosmic Token position
      description: |
        Returns the game-wide exact Cosmic Token (ERC-20) position from
        one consistent database snapshot: the indexed total supply and
        holder count, game-wide earnings by source, the amount consumed
        in CST bids, the resulting signed net issuance, transfer activity
        counters and the ten largest holders with their share of supply
        as a decimal-string percentage. All amounts are exact base-unit
        strings; the response performs no contract RPC. The token's
        name, symbol and decimals are immutable public chain data and are
        deliberately not served here.
