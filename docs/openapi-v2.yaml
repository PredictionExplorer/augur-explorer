            $ref: "#/components/schemas/Problem"
    ServiceUnavailable:
      description: The cached live contract state is not currently available.
      headers:
        Retry-After:
          description: Seconds until the next scheduled live-state refresh.
          required: true
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
