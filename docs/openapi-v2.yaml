    get:
      operationId: listCosmicGameCosmicSignatureTokenNameHistory
      summary: List every rename of one Cosmic Signature NFT
      description: |
        Returns the token's name changes, newest first by immutable
        event-log ID, each with the wallet that performed the rename. An
        empty `tokenName` means the name was cleared. A minted token that
        was never renamed returns an empty page; an unknown token is 404.
      tags:
        - CosmicGame tokens
      parameters:
        - $ref: "#/components/parameters/StakedNftTokenId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameTokenNameChangePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
