      summary: List daily Cosmic Token supply aggregates
      description: |
        Returns one row per UTC calendar day with at least one bid inside
        `[from,to)`: the day's bid count, exact minted, burned and net
        base units, and the running total supply at the end of the day
        computed over all history. The window covers at most 2,000 days;
        broader requests return 400 so clients can narrow the range.
      tags:
