      summary: List global Cosmic Signature staking reward deposits
      description: |
        Returns every staking-wallet ETH deposit newest first with exact
        distributed, collected, pending and integer-division remainder wei.
        The response proves totalDepositWei equals collectedWei plus
        pendingWei plus remainderWei.
