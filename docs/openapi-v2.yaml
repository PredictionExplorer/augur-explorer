        - volumeWei
        - cumulativeVolumeWei
      properties:
        bucketStart:
          description: Inclusive bucket start as Unix seconds.
          type: integer
          format: int64
          minimum: 0
        tradeCount:
          type: integer
          format: int64
          minimum: 0
        volumeWei:
          type: string
          pattern: "^[0-9]+$"
        cumulativeVolumeWei:
          description: Exact all-time volume through the end of this bucket.
          type: string
          pattern: "^[0-9]+$"
    RandomWalkTradingVolume:
      type: object
      additionalProperties: false
      required:
        - from
        - to
        - intervalSeconds
