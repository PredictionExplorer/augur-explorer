          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        marketplaceAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
    RankingRandomTokens:
      type: object
      additionalProperties: false
      required:
        - tokenIds
      properties:
        tokenIds:
          description: |
            Exploration token ids, fewest recorded matches first. May be
            shorter than the requested sample when the collection is
            smaller.
          type: array
          maxItems: 100
          items:
            type: integer
            format: int64
            minimum: 0
    RankingPair:
      type: object
      additionalProperties: false
      required:
        - firstTokenId
        - secondTokenId
        - pairExhausted
      properties:
        firstTokenId:
          type: integer
          format: int64
          minimum: 0
        secondTokenId:
          type: integer
          format: int64
          minimum: 0
        pairExhausted:
          description: |
            True when every re-roll attempt found a pair the voter had
            already voted on; the returned pair is the last attempt.
          type: boolean
    RankingRating:
      type: object
      additionalProperties: false
      required:
        - tokenId
        - rating
        - matchCount
      properties:
        tokenId:
          type: integer
          format: int64
          minimum: 0
        rating:
          description: Elo rating; 1200 for tokens never voted on.
          type: number
          format: double
        matchCount:
          description: Recorded matches this token appeared in.
          type: integer
          format: int64
          minimum: 0
    RankingRatingPage:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          maxItems: 200
          items:
            $ref: "#/components/schemas/RankingRating"
        meta:
          $ref: "#/components/schemas/PageMeta"
    RankingStatistics:
      type: object
      additionalProperties: false
      required:
        - totalVotes
        - walletVotes
        - distinctVoters
        - ratedTokens
      properties:
        totalVotes:
          description: All recorded matches, wallet-signed and admin.
          type: integer
          format: int64
          minimum: 0
        walletVotes:
          description: Matches recorded with a wallet voter of record.
          type: integer
          format: int64
          minimum: 0
        distinctVoters:
          description: Distinct wallets that have voted.
          type: integer
          format: int64
          minimum: 0
        ratedTokens:
          description: Tokens holding a recorded rating.
          type: integer
          format: int64
          minimum: 0
    RankingChallenge:
      type: object
      additionalProperties: false
      required:
        - nonce
        - expiresAt
      properties:
        nonce:
          description: One-time value the signed vote message embeds.
          type: string
          pattern: "^[0-9a-f]{64}$"
        expiresAt:
          description: UTC instant after which the nonce is rejected.
          type: string
          format: date-time
    RankingVoteRequest:
      type: object
      additionalProperties: false
      required:
        - firstTokenId
        - secondTokenId
        - winnerTokenId
        - chainId
        - nonce
        - signature
      properties:
        firstTokenId:
          type: integer
          format: int64
          minimum: 0
        secondTokenId:
          description: Must differ from firstTokenId.
          type: integer
          format: int64
          minimum: 0
        winnerTokenId:
          description: Must equal firstTokenId or secondTokenId.
          type: integer
          format: int64
          minimum: 0
        chainId:
          description: EIP-155 chain id the wallet signed on.
          type: integer
          format: int64
          minimum: 1
        nonce:
          description: Unconsumed nonce from the challenges operation.
          type: string
          minLength: 1
          maxLength: 128
        signature:
          description: |
            EIP-191 personal_sign signature (65 bytes, hex, optional 0x
            prefix) over the canonical vote message.
          type: string
          minLength: 1
          maxLength: 256
    RankingMatchRequest:
      type: object
      additionalProperties: false
      required:
        - firstTokenId
        - secondTokenId
        - winnerTokenId
      properties:
        firstTokenId:
          type: integer
          format: int64
          minimum: 0
        secondTokenId:
          description: Must differ from firstTokenId.
          type: integer
          format: int64
          minimum: 0
        winnerTokenId:
          description: Must equal firstTokenId or secondTokenId.
          type: integer
          format: int64
          minimum: 0
    RankingRatingChange:
      type: object
      additionalProperties: false
      required:
        - tokenId
        - rating
      properties:
        tokenId:
          type: integer
          format: int64
          minimum: 0
        rating:
          description: Elo rating after this result was applied.
          type: number
          format: double
    RankingVoteResult:
      type: object
      additionalProperties: false
      required:
        - firstToken
        - secondToken
        - winnerTokenId
        - voterAddress
      properties:
        firstToken:
          $ref: "#/components/schemas/RankingRatingChange"
        secondToken:
          $ref: "#/components/schemas/RankingRatingChange"
        winnerTokenId:
          type: integer
          format: int64
          minimum: 0
        voterAddress:
          description: Recovered signer recorded as the voter.
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
    RankingMatchResult:
      type: object
      additionalProperties: false
      required:
        - firstToken
        - secondToken
        - winnerTokenId
      properties:
        firstToken:
          $ref: "#/components/schemas/RankingRatingChange"
        secondToken:
          $ref: "#/components/schemas/RankingRatingChange"
        winnerTokenId:
          type: integer
          format: int64
          minimum: 0
