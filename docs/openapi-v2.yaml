openapi: 3.0.3
info:
  title: RWCG Backend API v2
  version: 0.14.0
  description: |
    Resource-oriented API for RandomWalk and CosmicGame. V2 is introduced
    incrementally while the frozen v1 contract remains available.
servers:
  - url: /
paths:
  /api/v2/cosmicgame/contracts/addresses:
    get:
      operationId: getCosmicGameContractAddresses
      summary: Get the deployed CosmicGame contract registry
      description: |
        Returns the complete database-backed CosmicGame registry plus the
        RandomWalk marketplace registry entry. Addresses are canonical, an
        incomplete registry is an internal error, and the response performs
        no contract RPC.
      tags:
        - CosmicGame contracts
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameContractAddresses"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/contracts/configuration:
    get:
      operationId: getCosmicGameContractConfiguration
      summary: Get cached CosmicGame contract configuration
      description: |
        Returns a mechanics-consistent cache snapshot of owner-tunable
        parameters. Constants refresh every five minutes; dependent live
        timing fields refresh every five seconds. The handler never performs
        request-time RPC.
      tags:
        - CosmicGame contracts
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameContractConfiguration"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/contracts/balances:
    get:
      operationId: getCosmicGameContractBalances
      summary: Get cached CosmicGame and charity ETH balances
      description: Exact wei balances from one block-pinned five-second cache refresh; no request-time RPC.
      tags:
        - CosmicGame contracts
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameContractBalances"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds:
    get:
      operationId: listRounds
      summary: List completed CosmicGame rounds
      tags:
        - CosmicGame rounds
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/current:
    get:
      operationId: getCurrentRound
      summary: Get the current open CosmicGame round
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentRound"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/current/bid-prices:
    get:
      operationId: getCosmicGameCurrentBidPrices
      summary: Get cached next-bid prices and Dutch-auction progress
      description: |
        Returns exact ETH/CST prices and duration/elapsed values from one
        block-pinned five-second cache refresh. Auction progress is clamped
        to the inclusive range from zero through duration. The handler never
        performs request-time RPC.
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentBidPrices"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/current/special-winners:
    get:
      operationId: getCosmicGameCurrentSpecialWinners
      summary: Get cached live endurance and chrono-warrior standings
      description: |
        Returns block-coherent special-winner standings from the 30-second
        cache. Cache refresh combines block-pinned contract reads with a
        best-effort database lookup for the last CST bid event ID; a missing
        event omits that optional field. The handler never performs
        request-time RPC.
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentSpecialWinners"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/{round}:
    get:
      operationId: getRound
      summary: Get one completed CosmicGame round
      tags:
        - CosmicGame rounds
      parameters:
        - $ref: "#/components/parameters/Round"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameRound"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/bids:
    get:
      operationId: listRoundBids
      summary: List bids in one CosmicGame round
      tags:
        - CosmicGame bids
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundBidPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/bids/{position}:
    get:
      operationId: getRoundBid
      summary: Get one bid by its position in a CosmicGame round
      tags:
        - CosmicGame bids
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/BidPosition"
      responses:
        "200":
          $ref: "#/components/responses/Bid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/prizes:
    get:
      operationId: listRoundPrizes
      summary: List prizes awarded in one completed CosmicGame round
      tags:
        - CosmicGame prizes
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundPrizePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/raffle-eth-deposits:
    get:
      operationId: listRoundRaffleEthDeposits
      summary: List bidder raffle ETH wallet deposits in one completed round
      tags:
        - CosmicGame raffles
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundRaffleEthDepositPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/raffle-nft-winners:
    get:
      operationId: listRoundRaffleNftWinners
      summary: List raffle NFT winners in one completed round
      tags:
        - CosmicGame raffles
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/RaffleNftPoolParam"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundRaffleNftWinnerPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/eth-donations:
    get:
      operationId: listRoundEthDonations
      summary: List direct ETH donations made during one round
      description: |
        Returns plain and info-carrying direct donations in newest-first event
        order. Donations are available while a round is open; a nonnegative
        round without donation records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundEthDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/erc20-donations:
    get:
      operationId: listRoundErc20Donations
      summary: List ERC-20 donations made during one round
      description: |
        Returns donation events in newest-first event order. Token amounts are
        exact base-unit integers because arbitrary ERC-20 tokens need not use
        18 decimals. A nonnegative round without records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundErc20DonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/nft-donations:
    get:
      operationId: listRoundNftDonations
      summary: List NFT donations made during one round
      description: |
        Returns donation events in newest-first event order. A nonnegative
        round without records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundNftDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}:
    get:
      operationId: getCosmicGameUser
      summary: Get an exact CosmicGame activity profile for one wallet
      description: |
        Returns a bounded aggregate profile without inline history arrays or
        request-time contract RPC. A syntactically valid wallet that has not
        been indexed yet returns the same zero-activity shape with its
        checksummed address.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/bids:
    get:
      operationId: listCosmicGameUserBids
      summary: List bids made by one wallet
      description: |
        Returns bids newest first by immutable event-log ID. A cursor is
        scoped to the normalized wallet and cannot be reused for another
        user. A valid wallet with no indexed bids returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserBidPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/prizes:
    get:
      operationId: listCosmicGameUserPrizes
      summary: List prizes won by one wallet
      description: |
        Returns every typed prize the wallet has won across all completed
        rounds, newest round first with a stable type/winner-index order
        inside each round. The round-wide `cosmicSignatureStakingEth`
        allocation never appears because it has no single winner. Raffle
        ETH claim state lives on the raffle-eth-deposits resource. A valid
        wallet with no indexed prizes returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserPrizePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/raffle-eth-deposits:
    get:
      operationId: listCosmicGameUserRaffleEthDeposits
      summary: List prize-wallet ETH deposits credited to one wallet
      description: |
        Returns the PrizesWallet ETH ledger of one wallet newest first by
        immutable event-log ID: bidder-raffle and chrono-warrior credits
        with exact amounts, claim state and the claiming withdrawal when
        one exists. With the `claimed` filter the collection membership
        changes as the wallet claims deposits, so a continuation cursor may
        skip rows claimed while paging; poll again without a cursor for a
        fresh view. A valid wallet with no indexed deposits returns an
        empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/DepositClaimedFilter"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserRaffleEthDepositPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/raffle-nft-wins:
    get:
      operationId: listCosmicGameUserRaffleNftWins
      summary: List raffle Cosmic Signature NFTs won by one wallet
      description: |
        Returns every raffle NFT win of one wallet newest first by
        immutable event-log ID, including the accompanying exact CST
        amount. `isStaker` false is a bidder-raffle win; `isStaker` true
        with `isRandomWalk` true is a RandomWalk-staker raffle win; and
        `isStaker` true with `isRandomWalk` false is a Cosmic Signature
        staker raffle win. A valid wallet with no indexed wins returns an
        empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserRaffleNftWinPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/eth-donations:
    get:
      operationId: listCosmicGameUserEthDonations
      summary: List direct ETH donations made by one wallet
      description: |
        Returns plain and info-carrying direct donations by one donor in
        newest-first event order across all rounds. A valid wallet with no
        indexed donations returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserEthDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/erc20-donations:
    get:
      operationId: listCosmicGameUserErc20Donations
      summary: List ERC-20 donations made by one wallet
      description: |
        Returns donation events by one donor in newest-first event order
        across all rounds. Token amounts are exact base-unit integers
        because arbitrary ERC-20 tokens need not use 18 decimals. A valid
        wallet with no indexed donations returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserErc20DonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/nft-donations:
    get:
      operationId: listCosmicGameUserNftDonations
      summary: List NFT donations made by one wallet
      description: |
        Returns donation events by one donor in newest-first event order
        across all rounds. Claim state is deliberately absent here: it
        belongs to the round winner and lives on the donated-nfts
        resource, which any wallet can be queried for. A valid wallet with
        no indexed donations returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserNftDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/donated-nfts:
    get:
      operationId: listCosmicGameUserDonatedNfts
      summary: List donated NFTs one wallet won or claimed
      description: |
        Returns each donated NFT from a round the wallet won plus each
        donated NFT the wallet claimed elsewhere (a timeout claim), newest
        donation first by immutable event-log ID, with per-item claim
        state and the claiming wallet when claimed. With the `status`
        filter the collection membership changes as NFTs are claimed, so a
        continuation cursor may skip rows claimed while paging; poll again
        without a cursor for a fresh view. A valid wallet with no matching
        donated NFTs returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/DonatedNftStatusFilter"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserDonatedNftPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/donated-erc20:
    get:
      operationId: listCosmicGameUserDonatedErc20
      summary: List donated ERC-20 entitlements one wallet won or claimed
      description: |
        Returns one summary per round and token where the wallet won the
        round or claimed donated tokens (a timeout claim): exact donated,
        claimed and remaining base-unit totals plus the latest claim event
        when one exists. Claimed totals aggregate every claimer of that
        round and token. Ordered by round newest first with a stable token
        order inside each round. A valid wallet with no matching
        entitlements returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserDonatedErc20Page"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/cosmic-signature-tokens:
    get:
      operationId: listCosmicGameUserCosmicSignatureTokens
      summary: List Cosmic Signature NFTs one wallet owns right now
      description: |
        Returns the Cosmic Signature NFTs the indexed ERC-721 transfer
        ledger currently attributes to the wallet, in ascending token
        order with each token's mint provenance (round, prize source,
        original winner, seed), its current name and whether it sits in
        the staking wallet right now. The collection is live membership:
        rows move between wallets on transfers, so a continuation cursor
        may skip tokens transferred while paging; poll again without a
        cursor for a fresh view. A valid wallet owning nothing returns an
        empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserCosmicSignatureTokenPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/cosmic-signature-transfers:
    get:
      operationId: listCosmicGameUserCosmicSignatureTransfers
      summary: List Cosmic Signature NFT transfers of one wallet
      description: |
        Returns every Cosmic Signature ERC-721 transfer the wallet sent
        or received — mints and burns included — newest first by
        immutable event-log ID, with both counterparties and the
        wallet-relative direction on each item. A valid wallet with no
        indexed transfers returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserCosmicSignatureTransferPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/cosmic-token-summary:
    get:
      operationId: getCosmicGameUserCosmicTokenSummary
      summary: Get one wallet's Cosmic Token position
      description: |
        Returns the wallet's exact Cosmic Token (ERC-20) position from
        one consistent database snapshot: the indexed balance, earnings
        by source, the amount consumed in CST bids, the resulting signed
        net game flow and the wallet's transfer activity counters. All
        amounts are exact base-unit strings. A valid wallet without
        indexed activity returns the all-zero shape.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserCosmicTokenSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/cosmic-token-transfers:
    get:
      operationId: listCosmicGameUserCosmicTokenTransfers
      summary: List Cosmic Token transfers of one wallet
      description: |
        Returns every Cosmic Token ERC-20 transfer the wallet sent or
        received — mints and burns included — newest first by immutable
        event-log ID, with exact base-unit amounts, both counterparties
        and the wallet-relative direction on each item. A valid wallet
        with no indexed transfers returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserCosmicTokenTransferPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/marketing-rewards:
    get:
      operationId: listCosmicGameUserMarketingRewards
      summary: List marketing rewards paid to one wallet
      description: |
        Returns every MarketingWallet reward paid to the wallet, newest
        first by immutable event-log ID, with exact Cosmic Token
        base-unit amounts. A valid wallet that never earned marketing
        rewards returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserMarketingRewardPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/pending-winnings:
    get:
      operationId: getCosmicGameUserPendingWinnings
      summary: Get one wallet's unclaimed winnings summary
      description: |
        Returns the wallet's claimable balances in one bounded summary:
        unclaimed raffle and chrono-warrior ETH still in the
        PrizesWallet, the donated-NFT count pending claim, the unclaimed
        Cosmic Signature staking reward and the number of donated ERC-20
        entitlements with a remaining balance in rounds the wallet won.
        Amounts are exact wei strings. Itemized views live on the
        raffle-eth-deposits, donated-nfts, donated-erc20 and
        staking/cst/deposits resources. A valid wallet with nothing to
        claim returns the all-zero shape.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserPendingWinnings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/staking/cst/actions:
    get:
      operationId: listCosmicGameUserCstStakingActions
      summary: List Cosmic Signature staking actions of one wallet
      description: |
        Returns the wallet's interleaved Cosmic Signature NFT stake and
        unstake events newest first by immutable event-log ID. Unstake
        items carry the exact reward collected by that unstake
        transaction; stake items never do. A valid wallet with no indexed
        staking activity returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserCstStakingActionPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/staking/cst/staked-tokens:
    get:
      operationId: listCosmicGameUserStakedCstTokens
      summary: List Cosmic Signature NFTs one wallet has staked right now
      description: |
        Returns the wallet's currently staked Cosmic Signature NFTs in
        ascending token order with the locking stake action and the
        token's mint provenance. The collection is live membership: rows
        disappear when tokens unstake, so a continuation cursor may skip
        tokens unstaked while paging; poll again without a cursor for a
        fresh view. A valid wallet with nothing staked returns an empty
        page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserStakedCstTokenPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/staking/cst/deposits:
    get:
      operationId: listCosmicGameUserStakingDeposits
      summary: List staking reward deposits one wallet has a share in
      description: |
        Returns one row per staking-wallet ETH deposit the wallet had
        staked tokens in, newest deposit first, with exact pool-wide and
        wallet-scoped wei amounts and per-deposit claim progress. The
        `claimed` filter keeps fully claimed (true) or still partially
        pending (false) deposits; claim state changes as the wallet
        unstakes, so a filtered continuation cursor may skip rows — poll
        again without a cursor for a fresh view. A valid wallet with no
        deposit share returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/StakingDepositClaimedFilter"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserStakingDepositPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/staking/cst/deposits/{depositId}/rewards:
    get:
      operationId: listCosmicGameUserStakingDepositRewards
      summary: List one wallet's per-token rewards inside one staking deposit
      description: |
        Returns the wallet's smallest reward units of one staking deposit
        — one row per stake action that participated — in ascending stake
        action order with exact reward wei and per-row claim state.
        Responds 404 when no staking deposit with that ID exists; a valid
        wallet without a share in an existing deposit gets an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/StakingDepositId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserStakingDepositRewardPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/staking/cst/token-rewards:
    get:
      operationId: listCosmicGameUserStakingTokenRewards
      summary: List one wallet's staking reward totals per staked token
      description: |
        Returns one row per Cosmic Signature NFT the wallet has ever
        earned staking rewards with, in ascending token order, carrying
        exact total, collected and pending reward wei. The pending amount
        moves to collected when the token unstakes. A valid wallet with
        no staking rewards returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserStakingTokenRewardPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/staking/cst/token-rewards/{nftTokenId}/deposits:
    get:
      operationId: listCosmicGameUserStakingTokenRewardDeposits
      summary: List the per-deposit rewards of one staked token
      description: |
        Returns the wallet's reward of every staking deposit one Cosmic
        Signature NFT participated in, in ascending deposit order with
        the deposit identity, exact reward wei and per-row claim state.
        Responds 404 when no Cosmic Signature NFT with that token ID has
        been minted; a valid wallet that never earned rewards with an
        existing token gets an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/StakedNftTokenId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserStakingTokenRewardDepositPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/staking/random-walk/actions:
    get:
      operationId: listCosmicGameUserRandomWalkStakingActions
      summary: List RandomWalk staking actions of one wallet
      description: |
        Returns the wallet's interleaved RandomWalk NFT stake and unstake
        events newest first by immutable event-log ID. RandomWalk staking
        earns no ETH rewards, so items carry no reward amounts; staker
        raffle NFT wins live on the raffle-nft-wins resource. A valid
        wallet with no indexed staking activity returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserRandomWalkStakingActionPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/staking/random-walk/staked-tokens:
    get:
      operationId: listCosmicGameUserStakedRandomWalkTokens
      summary: List RandomWalk NFTs one wallet has staked right now
      description: |
        Returns the wallet's currently staked RandomWalk NFTs in
        ascending token order with the locking stake action. The
        collection is live membership: rows disappear when tokens
        unstake, so a continuation cursor may skip tokens unstaked while
        paging; poll again without a cursor for a fresh view. A valid
        wallet with nothing staked returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserStakedRandomWalkTokenPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics:
    get:
      operationId: getCosmicGameStatistics
      summary: Get exact global CosmicGame statistics
      tags:
        - CosmicGame statistics
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameGlobalStatistics"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/counters:
    get:
      operationId: getCosmicGameCounters
      summary: Get canonical CosmicGame record counters
      tags:
        - CosmicGame statistics
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCounters"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/activity:
    get:
      operationId: getCosmicGameBiddingActivity
      summary: Get bounded bid-frequency analytics with detected spikes
      description: |
        Returns UTC/anchor-aligned frequency buckets after excluding bids made
        during the first hour of a round. Above-normal contiguous buckets are
        merged into spikes. A recent spike is one whose start falls in the
        30-day window ending at the server's current time.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one hour.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 3600
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingActivity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/frequency:
    get:
      operationId: getCosmicGameBiddingFrequency
      summary: Get bounded bid-frequency buckets
      description: |
        Bids in the first hour after each round opens are excluded. One-hour
        and one-day buckets align to UTC epoch boundaries; other widths anchor
        at `from`.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one day.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 86400
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingFrequency"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/type-ratio:
    get:
      operationId: getCosmicGameBiddingTypeRatio
      summary: Get bounded bid-type composition buckets
      description: |
        Returns raw ETH, RandomWalk and CST bid counts plus deterministic
        decimal-string percentages for a 100-percent stacked chart. Unlike
        activity/frequency, this composition includes bids from the first
        hour after a round opens.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - name: intervalSeconds
          in: query
          required: false
          description: Positive bucket width in seconds; defaults to one day.
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 158112000
            default: 86400
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingTypeRatio"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/top-active-periods:
    get:
      operationId: getCosmicGameBiddingTopActivePeriods
      summary: Get active periods for the lifetime top bidders
      description: |
        Ranks bidders by lifetime bid count, then segments their bids inside
        `[from,to)` into periods separated by more than `gapHours`. Results
        are limited to 2,000 periods; broader filters return 400 so clients
        can narrow the window or increase `gapHours` or `minBids`.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/AnalyticsFrom"
        - $ref: "#/components/parameters/AnalyticsTo"
        - $ref: "#/components/parameters/AnalyticsTop"
        - $ref: "#/components/parameters/AnalyticsGapHours"
        - $ref: "#/components/parameters/AnalyticsMinBids"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingTopActivePeriods"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/bidding/time-bounds:
    get:
      operationId: getCosmicGameBiddingTimeBounds
      summary: Get the first and last indexed bid timestamps
      tags:
        - CosmicGame statistics
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBiddingTimeBounds"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/bidders:
    get:
      operationId: listCosmicGameBidders
      summary: List CosmicGame bidders by bid count
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/BidderParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/winners:
    get:
      operationId: listCosmicGameWinners
      summary: List CosmicGame prize winners by prize count
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/WinnerParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/donors:
    get:
      operationId: listCosmicGameDonors
      summary: List CosmicGame ETH donors by donated amount
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/DonorParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/stakers/cst:
    get:
      operationId: listCosmicGameCstStakers
      summary: List Cosmic Signature Token stakers by earned reward
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CstStakerParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/stakers/random-walk:
    get:
      operationId: listCosmicGameRandomWalkStakers
      summary: List RandomWalk NFT stakers by current staked-token count
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RandomWalkStakerParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/participants/stakers/both:
    get:
      operationId: listCosmicGameDualStakers
      summary: List addresses currently staking both NFT families
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/ParticipantCursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/DualStakerParticipantPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/leaderboard/roi:
    get:
      operationId: listCosmicGameRoiLeaderboard
      summary: List the CosmicGame ROI leaderboard
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/RoiSortParam"
        - $ref: "#/components/parameters/MinBids"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoiLeaderboardPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/statistics/claims:
    get:
      operationId: listCosmicGameClaims
      summary: List claimable-asset summaries by completed round
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/ClaimSummaryPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/claims:
    get:
      operationId: getRoundClaims
      summary: Get bounded claim details for one completed round
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/ClaimTransactionsCursor"
        - $ref: "#/components/parameters/AttachedTokensCursor"
        - $ref: "#/components/parameters/UnclaimedItemsCursor"
      responses:
        "200":
          $ref: "#/components/responses/RoundClaimsDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  parameters:
    Round:
      name: round
      in: path
      required: true
      description: Zero-based CosmicGame round number.
      schema:
        type: integer
        format: int64
        minimum: 0
    BidPosition:
      name: position
      in: path
      required: true
      description: One-based bid position within the round.
      schema:
        type: integer
        format: int64
        minimum: 1
    Address:
      name: address
      in: path
      required: true
      description: Ethereum wallet address.
      schema:
        type: string
        minLength: 42
        maxLength: 42
        pattern: "^0x[0-9a-fA-F]{40}$"
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque continuation cursor returned by the previous page. Cursors are
        stable positions, not live subscriptions: while paging an open
        collection, newly indexed events ahead of the cursor are visible by
        polling again without a cursor.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    ParticipantCursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque continuation cursor for one ranked participant directory.
        Aggregate ranks can change while a client traverses pages; clients
        should de-duplicate addresses and restart from the first page when
        they need a fresh ranking.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of resources to return.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    RaffleNftPoolParam:
      name: pool
      in: query
      required: true
      description: Select bidder winners or RandomWalk-staker winners.
      schema:
        $ref: "#/components/schemas/RaffleNftPool"
    DepositClaimedFilter:
      name: claimed
      in: query
      required: false
      description: |
        Keep only claimed (true) or unclaimed (false) deposits. Omit the
        parameter for the full ledger.
      schema:
        type: boolean
    DonatedNftStatusFilter:
      name: status
      in: query
      required: false
      description: |
        Keep only claimed or unclaimed donated NFTs. Omit the parameter
        for both.
      schema:
        $ref: "#/components/schemas/DonatedNftStatus"
    StakingDepositClaimedFilter:
      name: claimed
      in: query
      required: false
      description: |
        Keep only fully claimed (true) or still partially pending (false)
        staking deposits. Omit the parameter for the full ledger.
      schema:
        type: boolean
    StakingDepositId:
      name: depositId
      in: path
      required: true
      description: Contract-assigned staking deposit identifier.
      schema:
        type: integer
        format: int64
        minimum: 0
    StakedNftTokenId:
      name: nftTokenId
      in: path
      required: true
      description: Cosmic Signature NFT token identifier.
      schema:
        type: integer
        format: int64
        minimum: 0
    RoiSortParam:
      name: sort
      in: query
      required: false
      description: Metric used to order the ROI leaderboard.
      schema:
        $ref: "#/components/schemas/RoiLeaderboardSort"
        default: netProfit
    MinBids:
      name: minBids
      in: query
      required: false
      description: Minimum lifetime bid count required for leaderboard inclusion.
      schema:
        type: integer
        minimum: 0
        default: 5
    AnalyticsFrom:
      name: from
      in: query
      required: true
      description: Inclusive beginning of the analytics window as Unix seconds.
      schema:
        type: integer
        format: int64
        minimum: 0
        maximum: 253402300799
    AnalyticsTo:
      name: to
      in: query
      required: true
      description: Exclusive end of the analytics window as Unix seconds.
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 253402300799
    AnalyticsTop:
      name: top
      in: query
      required: false
      description: Number of lifetime top bidders whose activity is analyzed.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AnalyticsGapHours:
      name: gapHours
      in: query
      required: false
      description: A larger gap starts a new bidder activity period.
      schema:
        type: integer
        minimum: 1
        maximum: 8760
        default: 6
    AnalyticsMinBids:
      name: minBids
      in: query
      required: false
      description: Minimum number of bids required to retain an activity period.
      schema:
        type: integer
        minimum: 1
        maximum: 1000000
        default: 2
    ClaimTransactionsCursor:
      name: claimTransactionsCursor
      in: query
      required: false
      description: Opaque continuation cursor for the claim-transactions section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    AttachedTokensCursor:
      name: attachedTokensCursor
      in: query
      required: false
      description: Opaque continuation cursor for the attached-tokens section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    UnclaimedItemsCursor:
      name: unclaimedItemsCursor
      in: query
      required: false
      description: Opaque continuation cursor for the unclaimed-items section.
      schema:
        type: string
        minLength: 1
        maxLength: 512
  schemas:
    Problem:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
    ContractAddressRegistry:
      type: object
      additionalProperties: false
      required:
        - cosmicGameAddress
        - cosmicSignatureAddress
        - cosmicTokenAddress
        - cosmicDaoAddress
        - charityWalletAddress
        - prizesWalletAddress
        - randomWalkAddress
        - cstStakingWalletAddress
        - randomWalkStakingWalletAddress
        - marketingWalletAddress
        - marketplaceAddress
        - implementationAddress
      properties:
        cosmicGameAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cosmicSignatureAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cosmicTokenAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cosmicDaoAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        charityWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        prizesWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        randomWalkAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        cstStakingWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        randomWalkStakingWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        marketingWalletAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        marketplaceAddress:
          type: string
