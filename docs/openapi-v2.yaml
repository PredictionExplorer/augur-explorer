  /api/v2/cosmicgame/users/{address}/staking/cst/staked-tokens:
    get:
      operationId: listCosmicGameUserStakedCstTokens
      summary: List Cosmic Signature NFTs one wallet has staked right now
      description: |
        Returns the wallet's currently staked Cosmic Signature NFTs in
        ascending token order with the locking stake action and the
        token's mint provenance. The collection is live membership: rows
        disappear when tokens unstake, so a continuation cursor may skip
        tokens unstaked while paging; poll again without a cursor for a
        fresh view. A valid wallet with nothing staked returns an empty
