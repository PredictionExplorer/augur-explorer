              type: string
              enum: [v1]
            cstBidRewardMode:
              type: string
              enum: [fixed]
            cstRoundStartAuctionMode:
              type: string
              enum: [divisor]
          not:
            anyOf:
              - required: [cstBidRewardMultiplier]
              - required: [cstDutchAuctionDurationChangeDivisor]
        - title: V2 contract configuration
          required:
            - cstBidRewardMultiplier
            - cstDutchAuctionDurationChangeDivisor
          properties:
