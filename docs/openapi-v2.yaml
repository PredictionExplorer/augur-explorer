        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserStakedCstTokenPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/staking/cst/deposits:
    get:
      operationId: listCosmicGameUserStakingDeposits
      summary: List staking reward deposits one wallet has a share in
      description: |
        Returns one row per staking-wallet ETH deposit the wallet had
        staked tokens in, newest deposit first, with exact pool-wide and
        wallet-scoped wei amounts and per-deposit claim progress. The
        `claimed` filter keeps fully claimed (true) or still partially
        pending (false) deposits; claim state changes as the wallet
        unstakes, so a filtered continuation cursor may skip rows — poll
        again without a cursor for a fresh view. A valid wallet with no
        deposit share returns an empty page.
      tags:
        - CosmicGame users
      parameters:
