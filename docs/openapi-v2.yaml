          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/marketing-rewards:
    get:
      operationId: listCosmicGameMarketingRewards
      summary: List every marketing reward the MarketingWallet paid
      description: |
        Returns the global MarketingWallet reward ledger, newest first by
        immutable event-log ID, with exact Cosmic Token base-unit amounts
        and the rewarded wallet on each item. The per-wallet view lives
        on the user marketing-rewards resource.
      tags:
        - CosmicGame statistics
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameMarketingRewardPage"
        "400":
          $ref: "#/components/responses/BadRequest"
