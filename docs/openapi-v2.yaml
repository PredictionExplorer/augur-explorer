          type: string
          pattern: "^[0-9]+$"
        occurredAt:
          type: string
          format: date-time
        withdrawerAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        nftTokenId:
          description: The last minted token at withdrawal time.
          type: integer
          format: int64
          minimum: 0
    RandomWalkWithdrawalStatistics:
      description: Exact mint-pool withdrawal aggregates.
      type: object
      additionalProperties: false
      required:
