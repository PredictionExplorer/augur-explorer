openapi: 3.0.3
info:
  title: RWCG Backend API v2
  version: 0.3.0
  description: |
    Resource-oriented API for RandomWalk and CosmicGame. V2 is introduced
    incrementally while the frozen v1 contract remains available.
servers:
  - url: /
paths:
  /api/v2/cosmicgame/rounds:
    get:
      operationId: listRounds
      summary: List completed CosmicGame rounds
      tags:
        - CosmicGame rounds
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/current:
    get:
      operationId: getCurrentRound
      summary: Get the current open CosmicGame round
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentRound"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/{round}:
    get:
      operationId: getRound
      summary: Get one completed CosmicGame round
      tags:
        - CosmicGame rounds
      parameters:
        - $ref: "#/components/parameters/Round"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameRound"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/bids:
    get:
      operationId: listRoundBids
      summary: List bids in one CosmicGame round
      tags:
        - CosmicGame bids
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundBidPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/bids/{position}:
    get:
      operationId: getRoundBid
      summary: Get one bid by its position in a CosmicGame round
      tags:
        - CosmicGame bids
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/BidPosition"
      responses:
        "200":
          $ref: "#/components/responses/Bid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  parameters:
    Round:
      name: round
      in: path
      required: true
      description: Zero-based CosmicGame round number.
      schema:
        type: integer
        format: int64
        minimum: 0
    BidPosition:
      name: position
      in: path
      required: true
      description: One-based bid position within the round.
      schema:
        type: integer
        format: int64
        minimum: 1
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque continuation cursor returned by the previous page.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of resources to return.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  schemas:
    Problem:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
    RoundStatus:
      type: string
      enum:
        - completed
        - open
    ClaimTransaction:
      type: object
      additionalProperties: false
      required:
        - eventLogId
        - blockNumber
        - transactionHash
        - occurredAt
      properties:
        eventLogId:
          type: integer
          format: int64
          minimum: 1
        blockNumber:
          type: integer
          format: int64
          minimum: 0
        transactionHash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        occurredAt:
          type: string
          format: date-time
    MainPrize:
      type: object
      additionalProperties: false
      required:
        - winnerAddress
        - ethAmountWei
        - nftTokenId
      properties:
        winnerAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        ethAmountWei:
          type: string
          pattern: "^[0-9]+$"
        cstAmountWei:
          type: string
          pattern: "^[0-9]+$"
        nftTokenId:
          type: integer
          format: int64
          minimum: 0
        seed:
          type: string
        secondaryPrizeClaimDeadline:
          type: string
          format: date-time
    RoundStatistics:
      type: object
      additionalProperties: false
      required:
        - totalBids
        - donatedNftCount
        - erc20DonationCount
        - raffleEthDepositsWei
        - raffleNftCount
        - donationCount
        - donationAmountWei
      properties:
        totalBids:
          type: integer
          format: int64
          minimum: 0
        donatedNftCount:
          type: integer
          format: int64
          minimum: 0
        erc20DonationCount:
          type: integer
          format: int64
          minimum: 0
        raffleEthDepositsWei:
          type: string
          pattern: "^[0-9]+$"
        raffleNftCount:
          type: integer
          format: int64
          minimum: 0
        donationCount:
          type: integer
          format: int64
          minimum: 0
        donationAmountWei:
          type: string
          pattern: "^[0-9]+$"
        parameterWindowStartedAt:
          type: string
          format: date-time
        activatedAt:
          type: string
          format: date-time
        parameterWindowDurationSeconds:
          type: integer
          format: int64
          minimum: 0
        roundStartedAt:
          type: string
          format: date-time
        roundEndedAt:
          type: string
          format: date-time
        roundDurationSeconds:
          type: integer
          format: int64
          minimum: 0
    CharityAllocation:
      type: object
      additionalProperties: false
      required:
        - charityAddresses
        - amountWei
      properties:
        charityAddresses:
          type: array
          items:
            type: string
            pattern: "^0x[0-9a-fA-F]{40}$"
        amountWei:
          type: string
          pattern: "^[0-9]+$"
    StakingAllocation:
      type: object
      additionalProperties: false
      required:
        - depositId
        - amountWei
        - amountPerTokenWei
        - stakedTokenCount
      properties:
        depositId:
          type: integer
          format: int64
          minimum: 0
        amountWei:
          type: string
          pattern: "^[0-9]+$"
        amountPerTokenWei:
          type: string
          pattern: "^[0-9]+$"
        stakedTokenCount:
          type: integer
          format: int64
          minimum: 0
    TokenPrize:
      type: object
      additionalProperties: false
      required:
        - winnerAddress
        - nftTokenId
        - cstAmountWei
      properties:
        winnerAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        nftTokenId:
          type: integer
          format: int64
          minimum: 0
        cstAmountWei:
          type: string
          pattern: "^[0-9]+$"
    ChronoWarriorPrize:
      type: object
      additionalProperties: false
      required:
        - winnerAddress
        - ethAmountWei
        - cstAmountWei
        - nftTokenId
      properties:
        winnerAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        ethAmountWei:
          type: string
          pattern: "^[0-9]+$"
        cstAmountWei:
          type: string
          pattern: "^[0-9]+$"
        nftTokenId:
          type: integer
          format: int64
          minimum: 0
    CosmicGameRoundSummary:
      type: object
      additionalProperties: false
      required:
        - round
        - status
        - completedAt
        - mainPrize
        - totalBids
        - donatedNftCount
        - erc20DonationCount
        - raffleEthDepositsWei
        - raffleNftCount
      properties:
        round:
          type: integer
          format: int64
          minimum: 0
        status:
          $ref: "#/components/schemas/RoundStatus"
        completedAt:
          type: string
          format: date-time
        mainPrize:
          $ref: "#/components/schemas/MainPrize"
        totalBids:
          type: integer
          format: int64
          minimum: 0
        donatedNftCount:
          type: integer
          format: int64
          minimum: 0
        erc20DonationCount:
          type: integer
          format: int64
          minimum: 0
        raffleEthDepositsWei:
          type: string
          pattern: "^[0-9]+$"
        raffleNftCount:
          type: integer
          format: int64
          minimum: 0
    CosmicGameRound:
      type: object
      additionalProperties: false
      required:
        - round
        - status
        - claim
        - mainPrize
        - statistics
      properties:
        round:
          type: integer
          format: int64
          minimum: 0
        status:
          $ref: "#/components/schemas/RoundStatus"
        claim:
          $ref: "#/components/schemas/ClaimTransaction"
        mainPrize:
          $ref: "#/components/schemas/MainPrize"
        statistics:
          $ref: "#/components/schemas/RoundStatistics"
        charity:
          $ref: "#/components/schemas/CharityAllocation"
        staking:
          $ref: "#/components/schemas/StakingAllocation"
        enduranceChampion:
          $ref: "#/components/schemas/TokenPrize"
        lastCstBidder:
          $ref: "#/components/schemas/TokenPrize"
        chronoWarrior:
          $ref: "#/components/schemas/ChronoWarriorPrize"
    CosmicGameCurrentRound:
      type: object
      additionalProperties: false
      required:
        - round
        - status
        - nextEthBidPriceWei
        - secondsUntilMainPrize
        - mainPrizeAmountWei
        - rafflePrizeAmountWei
        - stakingRewardAmountWei
        - mainPrizeTimeIncrementMicroseconds
        - statistics
      properties:
        round:
          type: integer
          format: int64
          minimum: 0
        status:
          $ref: "#/components/schemas/RoundStatus"
        nextEthBidPriceWei:
          type: string
          pattern: "^[0-9]+$"
        secondsUntilMainPrize:
          type: integer
          format: int64
          minimum: 0
        mainPrizeAmountWei:
          type: string
          pattern: "^[0-9]+$"
        rafflePrizeAmountWei:
          type: string
          pattern: "^[0-9]+$"
        stakingRewardAmountWei:
          type: string
          pattern: "^[0-9]+$"
        mainPrizeTimeIncrementMicroseconds:
          type: string
          pattern: "^[0-9]+$"
        lastBidderAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        statistics:
          $ref: "#/components/schemas/RoundStatistics"
    RoundPage:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CosmicGameRoundSummary"
        meta:
          $ref: "#/components/schemas/PageMeta"
    BidType:
      type: string
      enum:
        - eth
        - randomWalk
        - cst
        - unknown
    NftDonation:
      type: object
      additionalProperties: false
      required:
        - tokenId
        - tokenAddress
        - tokenUri
      properties:
        tokenId:
          type: integer
          format: int64
          minimum: 0
        tokenAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        tokenUri:
          type: string
    Erc20Donation:
      type: object
      additionalProperties: false
      required:
        - tokenAddress
        - amountWei
      properties:
        tokenAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        amountWei:
          type: string
          pattern: "^[0-9]+$"
    Bid:
      type: object
      additionalProperties: false
      required:
        - eventLogId
        - blockNumber
        - transactionHash
        - occurredAt
        - bidderAddress
        - round
        - position
        - bidType
        - prizeAt
        - cstRewardWei
      properties:
        eventLogId:
          type: integer
          format: int64
          minimum: 1
        blockNumber:
          type: integer
          format: int64
          minimum: 0
        transactionHash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        occurredAt:
          type: string
          format: date-time
        bidderAddress:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        round:
          type: integer
          format: int64
          minimum: 0
        position:
          type: integer
          format: int64
          minimum: 1
        bidType:
          $ref: "#/components/schemas/BidType"
        ethPriceWei:
          type: string
          pattern: "^[0-9]+$"
        cstPriceWei:
          type: string
          pattern: "^[0-9]+$"
        randomWalkTokenId:
          type: integer
          format: int64
          minimum: 0
        message:
          type: string
        prizeAt:
          type: string
          format: date-time
        cstRewardWei:
          type: string
          pattern: "^[0-9]+$"
        bidCstRewardAmountWei:
          type: string
          pattern: "^[0-9]+$"
        cstDutchAuctionDurationSeconds:
          type: integer
          format: int64
          minimum: 0
        nftDonation:
          $ref: "#/components/schemas/NftDonation"
        erc20Donation:
          $ref: "#/components/schemas/Erc20Donation"
    PageMeta:
      type: object
      additionalProperties: false
      required:
        - limit
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 200
        nextCursor:
          type: string
          minLength: 1
          maxLength: 512
    RoundBidPage:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Bid"
        meta:
          $ref: "#/components/schemas/PageMeta"
  responses:
    RoundPage:
      description: One stable page of completed rounds.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RoundPage"
    CosmicGameRound:
      description: The requested completed round.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CosmicGameRound"
    CosmicGameCurrentRound:
      description: The current open round from the cached live contract state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CosmicGameCurrentRound"
    RoundBidPage:
      description: One stable page of round bids.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RoundBidPage"
    Bid:
      description: The requested bid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Bid"
    BadRequest:
      description: A path or query parameter is invalid.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalError:
      description: The request could not be completed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ServiceUnavailable:
      description: The cached live contract state is not currently available.
      headers:
        Retry-After:
          description: Seconds until the next scheduled live-state refresh.
          required: true
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
