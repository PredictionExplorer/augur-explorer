        - intervalSeconds
        - points
      properties:
        from:
          type: integer
          format: int64
          minimum: 0
        to:
          type: integer
          format: int64
          minimum: 1
        intervalSeconds:
          type: integer
          format: int64
          minimum: 1
        points:
          type: array
          maxItems: 2000
          items:
            $ref: "#/components/schemas/RandomWalkListingFloorPoint"
    RandomWalkMonthlyMints:
      description: One calendar month's exact mint aggregates.
