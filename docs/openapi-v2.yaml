    get:
      operationId: listCosmicGameCosmicTokenSupplyByBid
      summary: List the per-bid Cosmic Token supply ledger
      description: |
        Returns one row per bid, oldest first by immutable event-log ID,
        with the exact base units the bid minted (its CST reward), burned
        (the CST price of a CST bid) and the running total supply after
        the bid. The ledger is append-only, so pages are stable.
      tags:
        - CosmicGame tokens
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCosmicTokenSupplyByBidPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/cosmic-token/supply-history/daily:
    get:
