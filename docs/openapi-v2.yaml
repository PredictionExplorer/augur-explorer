        from:
          type: integer
          format: int64
          minimum: 0
        to:
          type: integer
          format: int64
          minimum: 1
        intervalSeconds:
          type: integer
          format: int64
          minimum: 1
        baseVolumeWei:
          description: Exact volume traded before the window.
          type: string
          pattern: "^[0-9]+$"
        buckets:
          type: array
          maxItems: 2000
          items:
            $ref: "#/components/schemas/RandomWalkVolumeBucket"
    RandomWalkListingFloorPoint:
      description: The cheapest sell listing created inside one bucket.
      type: object
      additionalProperties: false
      required:
