openapi: 3.0.3
info:
  title: RWCG Backend API v2
  version: 0.21.0
  description: |
    Resource-oriented API for RandomWalk and CosmicGame. This is the
    canonical specification: the v2 endpoint inventory is complete, every
    v1 read/write surface has a bounded replacement here (mapped in
    docs/api-v2-migration.md), and v1 is deprecated (RFC 9745 Deprecation
    headers) pending the ADR-0005 sunset gates.
servers:
  - url: /
paths:
  /api/v2/cosmicgame/moderation/banned-bids:
    get:
      operationId: listCosmicGameBannedBids
      summary: List active CosmicGame bid bans
      description: |
        Returns active bid bans newest first. The cursor is a stable
        boundary: bans created after the first page remain ahead of an
        existing traversal.
      tags:
        - CosmicGame moderation
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameBannedBidPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createCosmicGameBidBan
      summary: Ban one CosmicGame bid (admin)
      description: |
        Creates one active ban for an indexed bid. The bidder address is
        resolved from the canonical bid instead of accepted from the client.
        Requires X-Admin-Key; when ADMIN_API_KEY is unset the operation fails
        closed with 503. A bid that is already banned answers 409.
      tags:
        - CosmicGame moderation
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBidBanRequest"
      responses:
        "201":
          $ref: "#/components/responses/CosmicGameBannedBidCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/RequestTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/AdminDisabled"
  /api/v2/cosmicgame/moderation/banned-bids/{bidId}:
    delete:
      operationId: deleteCosmicGameBidBan
      summary: Remove one CosmicGame bid ban (admin)
      description: |
        Removes the active ban identified by its bid id. Requires
        X-Admin-Key; when ADMIN_API_KEY is unset the operation fails closed
        with 503. A bid without an active ban answers 404.
      tags:
        - CosmicGame moderation
      security:
        - AdminKey: []
      parameters:
        - $ref: "#/components/parameters/BidId"
      responses:
        "204":
          description: The bid ban was removed.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/AdminDisabled"
  /api/v2/cosmicgame/contracts/addresses:
    get:
      operationId: getCosmicGameContractAddresses
      summary: Get the deployed CosmicGame contract registry
      description: |
        Returns the complete database-backed CosmicGame registry plus the
        RandomWalk marketplace registry entry. Addresses are canonical, an
        incomplete registry is an internal error, and the response performs
        no contract RPC.
      tags:
        - CosmicGame contracts
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameContractAddresses"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/contracts/configuration:
    get:
      operationId: getCosmicGameContractConfiguration
      summary: Get cached CosmicGame contract configuration
      description: |
        Returns a mechanics-consistent cache snapshot of owner-tunable
        parameters. Constants refresh every five minutes; dependent live
        timing fields refresh every five seconds. The handler never performs
        request-time RPC.
      tags:
        - CosmicGame contracts
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameContractConfiguration"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/contracts/balances:
    get:
      operationId: getCosmicGameContractBalances
      summary: Get cached CosmicGame and charity ETH balances
      description: Exact wei balances from one block-pinned five-second cache refresh; no request-time RPC.
      tags:
        - CosmicGame contracts
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameContractBalances"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds:
    get:
      operationId: listRounds
      summary: List completed CosmicGame rounds
      tags:
        - CosmicGame rounds
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/current:
    get:
      operationId: getCurrentRound
      summary: Get the current open CosmicGame round
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentRound"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/current/bid-prices:
    get:
      operationId: getCosmicGameCurrentBidPrices
      summary: Get cached next-bid prices and Dutch-auction progress
      description: |
        Returns exact ETH/CST prices and duration/elapsed values from one
        block-pinned five-second cache refresh. Auction progress is clamped
        to the inclusive range from zero through duration. The handler never
        performs request-time RPC.
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentBidPrices"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/current/special-winners:
    get:
      operationId: getCosmicGameCurrentSpecialWinners
      summary: Get cached live endurance and chrono-warrior standings
      description: |
        Returns block-coherent special-winner standings from the 30-second
        cache. Cache refresh combines block-pinned contract reads with a
        best-effort database lookup for the last CST bid event ID; a missing
        event omits that optional field. The handler never performs
        request-time RPC.
      tags:
        - CosmicGame rounds
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameCurrentSpecialWinners"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v2/cosmicgame/rounds/{round}:
    get:
      operationId: getRound
      summary: Get one completed CosmicGame round
      tags:
        - CosmicGame rounds
      parameters:
        - $ref: "#/components/parameters/Round"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameRound"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/bids:
    get:
      operationId: listRoundBids
      summary: List bids in one CosmicGame round
      tags:
        - CosmicGame bids
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundBidPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/bids/{position}:
    get:
      operationId: getRoundBid
      summary: Get one bid by its position in a CosmicGame round
      tags:
        - CosmicGame bids
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/BidPosition"
      responses:
        "200":
          $ref: "#/components/responses/Bid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/prizes:
    get:
      operationId: listRoundPrizes
      summary: List prizes awarded in one completed CosmicGame round
      tags:
        - CosmicGame prizes
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundPrizePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/raffle-eth-deposits:
    get:
      operationId: listRoundRaffleEthDeposits
      summary: List bidder raffle ETH wallet deposits in one completed round
      tags:
        - CosmicGame raffles
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundRaffleEthDepositPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/raffle-nft-winners:
    get:
      operationId: listRoundRaffleNftWinners
      summary: List raffle NFT winners in one completed round
      tags:
        - CosmicGame raffles
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/RaffleNftPoolParam"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundRaffleNftWinnerPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/eth-donations:
    get:
      operationId: listRoundEthDonations
      summary: List direct ETH donations made during one round
      description: |
        Returns plain and info-carrying direct donations in newest-first event
        order. Donations are available while a round is open; a nonnegative
        round without donation records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundEthDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/erc20-donations:
    get:
      operationId: listRoundErc20Donations
      summary: List ERC-20 donations made during one round
      description: |
        Returns donation events in newest-first event order. Token amounts are
        exact base-unit integers because arbitrary ERC-20 tokens need not use
        18 decimals. A nonnegative round without records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundErc20DonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/nft-donations:
    get:
      operationId: listRoundNftDonations
      summary: List NFT donations made during one round
      description: |
        Returns donation events in newest-first event order. A nonnegative
        round without records returns an empty page.
      tags:
        - CosmicGame donations
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/RoundNftDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/rounds/{round}/staking-rewards:
    get:
      operationId: listCosmicGameRoundStakingRewards
      summary: List Cosmic Signature staking rewards allocated in one round
      description: |
        Returns one exact reward allocation per staker and staking deposit,
        newest deposit first with a stable wallet tie-break. Collected and
        pending wei always add up to the staker's reward. A missing or open
        round returns 404 because staking rewards are deposited only when a
        round completes.
      tags:
        - CosmicGame staking
      parameters:
        - $ref: "#/components/parameters/Round"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameRoundStakingRewardPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}:
    get:
      operationId: getCosmicGameUser
      summary: Get an exact CosmicGame activity profile for one wallet
      description: |
        Returns a bounded aggregate profile without inline history arrays or
        request-time contract RPC. A syntactically valid wallet that has not
        been indexed yet returns the same zero-activity shape with its
        checksummed address.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/bids:
    get:
      operationId: listCosmicGameUserBids
      summary: List bids made by one wallet
      description: |
        Returns bids newest first by immutable event-log ID. A cursor is
        scoped to the normalized wallet and cannot be reused for another
        user. A valid wallet with no indexed bids returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserBidPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/prizes:
    get:
      operationId: listCosmicGameUserPrizes
      summary: List prizes won by one wallet
      description: |
        Returns every typed prize the wallet has won across all completed
        rounds, newest round first with a stable type/winner-index order
        inside each round. The round-wide `cosmicSignatureStakingEth`
        allocation never appears because it has no single winner. Raffle
        ETH claim state lives on the raffle-eth-deposits resource. A valid
        wallet with no indexed prizes returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserPrizePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/raffle-eth-deposits:
    get:
      operationId: listCosmicGameUserRaffleEthDeposits
      summary: List prize-wallet ETH deposits credited to one wallet
      description: |
        Returns the PrizesWallet ETH ledger of one wallet newest first by
        immutable event-log ID: bidder-raffle and chrono-warrior credits
        with exact amounts, claim state and the claiming withdrawal when
        one exists. With the `claimed` filter the collection membership
        changes as the wallet claims deposits, so a continuation cursor may
        skip rows claimed while paging; poll again without a cursor for a
        fresh view. A valid wallet with no indexed deposits returns an
        empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/DepositClaimedFilter"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserRaffleEthDepositPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/raffle-nft-wins:
    get:
      operationId: listCosmicGameUserRaffleNftWins
      summary: List raffle Cosmic Signature NFTs won by one wallet
      description: |
        Returns every raffle NFT win of one wallet newest first by
        immutable event-log ID, including the accompanying exact CST
        amount. `isStaker` false is a bidder-raffle win; `isStaker` true
        with `isRandomWalk` true is a RandomWalk-staker raffle win; and
        `isStaker` true with `isRandomWalk` false is a Cosmic Signature
        staker raffle win. A valid wallet with no indexed wins returns an
        empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserRaffleNftWinPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/eth-donations:
    get:
      operationId: listCosmicGameUserEthDonations
      summary: List direct ETH donations made by one wallet
      description: |
        Returns plain and info-carrying direct donations by one donor in
        newest-first event order across all rounds. A valid wallet with no
        indexed donations returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserEthDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/erc20-donations:
    get:
      operationId: listCosmicGameUserErc20Donations
      summary: List ERC-20 donations made by one wallet
      description: |
        Returns donation events by one donor in newest-first event order
        across all rounds. Token amounts are exact base-unit integers
        because arbitrary ERC-20 tokens need not use 18 decimals. A valid
        wallet with no indexed donations returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserErc20DonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/nft-donations:
    get:
      operationId: listCosmicGameUserNftDonations
      summary: List NFT donations made by one wallet
      description: |
        Returns donation events by one donor in newest-first event order
        across all rounds. Claim state is deliberately absent here: it
        belongs to the round winner and lives on the donated-nfts
        resource, which any wallet can be queried for. A valid wallet with
        no indexed donations returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserNftDonationPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/donated-nfts:
    get:
      operationId: listCosmicGameUserDonatedNfts
      summary: List donated NFTs one wallet won or claimed
      description: |
        Returns each donated NFT from a round the wallet won plus each
        donated NFT the wallet claimed elsewhere (a timeout claim), newest
        donation first by immutable event-log ID, with per-item claim
        state and the claiming wallet when claimed. With the `status`
        filter the collection membership changes as NFTs are claimed, so a
        continuation cursor may skip rows claimed while paging; poll again
        without a cursor for a fresh view. A valid wallet with no matching
        donated NFTs returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/DonatedNftStatusFilter"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserDonatedNftPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/donated-erc20:
    get:
      operationId: listCosmicGameUserDonatedErc20
      summary: List donated ERC-20 entitlements one wallet won or claimed
      description: |
        Returns one summary per round and token where the wallet won the
        round or claimed donated tokens (a timeout claim): exact donated,
        claimed and remaining base-unit totals plus the latest claim event
        when one exists. Claimed totals aggregate every claimer of that
        round and token. Ordered by round newest first with a stable token
        order inside each round. A valid wallet with no matching
        entitlements returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserDonatedErc20Page"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/cosmic-signature-tokens:
    get:
      operationId: listCosmicGameUserCosmicSignatureTokens
      summary: List Cosmic Signature NFTs one wallet owns right now
      description: |
        Returns the Cosmic Signature NFTs the indexed ERC-721 transfer
        ledger currently attributes to the wallet, in ascending token
        order with each token's mint provenance (round, prize source,
        original winner, seed), its current name and whether it sits in
        the staking wallet right now. The collection is live membership:
        rows move between wallets on transfers, so a continuation cursor
        may skip tokens transferred while paging; poll again without a
        cursor for a fresh view. A valid wallet owning nothing returns an
        empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserCosmicSignatureTokenPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/users/{address}/cosmic-signature-transfers:
    get:
      operationId: listCosmicGameUserCosmicSignatureTransfers
      summary: List Cosmic Signature NFT transfers of one wallet
      description: |
        Returns every Cosmic Signature ERC-721 transfer the wallet sent
        or received — mints and burns included — newest first by
        immutable event-log ID, with both counterparties and the
        wallet-relative direction on each item. A valid wallet with no
        indexed transfers returns an empty page.
      tags:
        - CosmicGame users
      parameters:
        - $ref: "#/components/parameters/Address"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameUserCosmicSignatureTransferPage"
        "400":
          $ref: "#/components/responses/BadRequest"
