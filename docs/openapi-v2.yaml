        "500":
          $ref: "#/components/responses/InternalError"
  /api/v2/cosmicgame/staking/random-walk/staked-tokens:
    get:
      operationId: listCosmicGameGlobalStakedRandomWalkTokens
      summary: List every RandomWalk NFT currently staked
      description: |
        Returns live staking-wallet membership in ascending token order,
        including the staker and locking action. Rows disappear on unstake,
        so clients needing a fresh snapshot should restart from the first page.
      tags:
        - CosmicGame staking
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/CosmicGameGlobalStakedRandomWalkTokenPage"
        "400":
          $ref: "#/components/responses/BadRequest"
