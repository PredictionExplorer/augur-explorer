  /api/randomwalk/ranking/beauty-pair-ids:
    get:
      deprecated: true
      tags: [randomwalk-ranking]
      summary: Random pair of token ids for the beauty contest
      description: When voter is supplied the pair is re-rolled up to 50 times to avoid pairs that wallet already voted on; pair_exhausted is true when no unvoted pair could be found.
      parameters:
        - name: voter
          in: query
          required: false
          description: Voter wallet address (0x-prefixed hex) used to filter already-voted pairs.
          schema: { type: string }
        - name: skip_pair_filter
          in: query
          required: false
          description: Pass 1 to skip the already-voted filter.
          schema: { type: string, enum: ['1'] }
      responses:
        '200':
          description: Pair of token ids.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token_ids:
                    type: array
                    items: { type: integer, format: int64 }
                  pair_exhausted: { type: boolean }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500':
          description: Database error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /api/randomwalk/token-ranking/match:
    post:
      deprecated: true
      tags: [randomwalk-ranking]
      summary: Record a ranking match result (admin)
      description: Records a pairwise beauty-contest result and updates Elo ratings. Requires the X-Ranking-Admin-Key header (fails closed with 503 when no key is configured) and is rate limited to 2 rps (burst 5) per IP. Public voting must use POST /api/randomwalk/add_game instead.
      security:
        - RankingAdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RankingMatchRequest' }
      responses:
        '200':
          description: Updated ratings.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RankingMatchResponse' }
        '400':
          description: Malformed body or invalid pair (nft1 and nft2 must be distinct non-negative ids). Database-not-configured errors use the status/error envelope instead.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SimpleError'
                  - $ref: '#/components/schemas/ErrorResponse'
        '401': { $ref: '#/components/responses/UnauthorizedAdmin' }
        '500':
          description: Database error while recording the match.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleError' }
        '503': { $ref: '#/components/responses/AdminKeyNotConfigured' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /api/randomwalk/add_game:
    post:
      deprecated: true
      tags: [randomwalk-ranking]
      summary: Submit a wallet-signed beauty-contest vote
      description: Verifies an EIP-191 personal_sign signature over the vote message, consumes the one-time sign_nonce, stores the voter and enforces one vote per pair per wallet. Rate limited to 1 rps (burst 10) per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddGameRequest' }
      responses:
        '200':
          description: Vote recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionResult' }
        '400':
          description: Malformed body, invalid pair, nft1_win not 0/1, invalid or expired sign_nonce, bad signature or disallowed chain_id. Database-not-configured errors use the status/error envelope instead.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SimpleError'
                  - $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: This wallet already voted on this pair.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleError' }
        '500':
          description: Database error while recording the vote.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }





