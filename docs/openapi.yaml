        rating_nft1: { type: number, format: double }
        rating_nft2: { type: number, format: double }
    AddGameRequest:
      type: object
      description: Wallet-signed beauty-contest vote (EIP-191 personal_sign over the vote message).
      required: [nft1, nft2, nft1_win, sign_nonce, signature, chain_id]
      properties:
        nft1: { type: integer, format: int64 }
        nft2: { type: integer, format: int64 }
        nft1_win:
          type: integer
          enum: [0, 1]
        sign_nonce:
          type: string
          description: One-time nonce from /api/randomwalk/ranking/sign-challenge.
        signature:
          type: string
          description: 65-byte hex signature (0x-prefixed or bare).
        chain_id: { type: integer, format: int64 }
    SimpleError:
      type: object
      description: Plain error object used by RandomWalk ranking endpoints.
      properties:
        error: { type: string }
    FaqQueryRequest:
      type: object
      required: [question]
      properties:
        question: { type: string }
        session_id:
          type: [string, 'null']
          description: Optional conversation session id; a new session is created when omitted.
    FaqQueryResponse:
      type: object
      properties:
        answer: { type: string }
        sources:
          type: array
          items: { type: string }
        session_id: { type: string }
    FaqReindexResponse:
      type: object
      properties:
        status: { type: string }
        documents_indexed: { type: integer }
    FaqProxyError:
      type: object
      description: Emitted by the Go proxy (HTTP 502) when the Python faq-bot backend is unreachable.
      properties:
        status: { type: integer, const: 0 }
        error: { type: string }
        component: { type: string }
        upstream: { type: string }
paths:
  /healthz:
    get:
      tags: [system]
      summary: Liveness probe
      responses:
        '200':
          description: Process is up and serving.
          content:
            text/plain:
              schema:
                type: string
                const: ok
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /readyz:
    get:
      tags: [system]
      summary: Readiness probe (database ping)
      responses:
        '200':
          description: Dependencies reachable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: ready }
        '503':
          description: Database not configured or unreachable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: unready }
                  reason: { type: string }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /version:
    get:
      tags: [system]
      summary: Build identity of the running binary
      description: Version/tag, VCS commit, build timestamp and Go toolchain, stamped at build time (falling back to the toolchain's embedded VCS metadata). Values are informational and deployment-dependent.
      responses:
        '200':
          description: Build identity.
          content:
            application/json:
              schema:
                type: object
                required: [version, commit, buildDate, goVersion]
                properties:
                  version: { type: string }
                  commit: { type: string }
                  buildDate: { type: string }
                  goVersion: { type: string }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /metadata/{token_id}:
    get:
      tags: [metadata]
      summary: ERC-721 tokenURI metadata (host-dispatched)
      description: Bare tokenURI route served for both projects. When the request Host (or first X-Forwarded-Host) contains "cosmicsignature" it returns Cosmic Signature metadata, otherwise RandomWalk metadata.
      parameters:
        - $ref: '#/components/parameters/TokenIdPath'
      responses:
        '200':
          description: Token metadata JSON.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CosmicSignatureNftMetadata'
                  - $ref: '#/components/schemas/RandomWalkNftMetadata'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: Token not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetadataError' }
        '500':
          description: Public image base URL cannot be derived (NFT_ASSETS_PUBLIC_BASE unset) or database error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetadataError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /cg/metadata/{token_id}:
    get:
      tags: [metadata]
      summary: Cosmic Signature token metadata (legacy path)
      description: Legacy Python-backend path; same handler as /api/cosmicgame/cst/metadata/{token_id}.
      parameters:
        - $ref: '#/components/parameters/TokenIdPath'
      responses:
        '200':
          description: OpenSea-compatible metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CosmicSignatureNftMetadata' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: Token not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetadataError' }
        '500':
          description: Public image base URL cannot be derived.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetadataError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /api/cosmicgame/cst/metadata/{token_id}:
    get:
      deprecated: true
      tags: [metadata]
      summary: Cosmic Signature token metadata
      description: OpenSea-compatible metadata JSON for a Cosmic Signature token; image and animation_url point at the /images asset mirror.
      parameters:
        - $ref: '#/components/parameters/TokenIdPath'
      responses:
        '200':
          description: OpenSea-compatible metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CosmicSignatureNftMetadata' }
