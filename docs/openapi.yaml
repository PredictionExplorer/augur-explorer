        '429': { $ref: '#/components/responses/TooManyRequests' }
  /api/randomwalk/metadata/{token_id}:
    get:
      deprecated: true
      tags: [metadata]
      summary: RandomWalk token metadata
      parameters:
        - $ref: '#/components/parameters/TokenIdPath'
      responses:
        '200':
          description: ERC-721 metadata JSON.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RandomWalkNftMetadata' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: Token not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetadataError' }
        '500':
          description: Public image base URL cannot be derived or database error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetadataError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /api/cosmicgame/faq/health:
    get:
      tags: [faq]
      summary: FAQ bot health (proxied)
      description: Proxies GET /health of the Python faq-bot backend and returns the upstream body and status code verbatim.
      responses:
        '200':
          description: Upstream health object (shape defined by the Python service).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  status: { type: string }
        '502':
          description: FAQ backend unreachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FaqProxyError' }
        '503':
          description: Upstream reports itself unhealthy.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /api/cosmicgame/faq/query:
    post:
      tags: [faq]
      summary: Ask the FAQ bot (proxied)
      description: Proxies to POST /api/query of the Python faq-bot backend. Upstream error responses (400 validation, 410 expired session, 503 subsystem unavailable) are FastAPI-style bodies passed through verbatim.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FaqQueryRequest' }
      responses:
        '200':
          description: Answer with sources and session id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FaqQueryResponse' }
        '400':
          description: Empty question (upstream validation error, FastAPI detail body).
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '410':
          description: Session expired (upstream).
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '502':
          description: FAQ backend unreachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FaqProxyError' }
        '503':
          description: Upstream subsystem (haystack / codex_mcp) unavailable.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /api/cosmicgame/faq/reindex:
    post:
      tags: [faq]
      summary: Re-index the FAQ knowledge base (proxied)
      description: Proxies to POST /api/reindex of the Python faq-bot backend.
      responses:
        '200':
          description: Re-index finished.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FaqReindexResponse' }
        '500':
          description: Upstream indexing failure (FastAPI detail body).
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '502':
          description: FAQ backend unreachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FaqProxyError' }
        '503':
          description: Upstream retriever not initialized.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /api/cosmicgame/statistics/dashboard:
    get:
      deprecated: true
      tags: [cosmicgame-statistics]
      summary: Dashboard snapshot (current round, prices, global statistics)
      description: Aggregated live view combining cached contract state, live contract reads and database statistics. Always returns HTTP 200.
      responses:
        '200':
          description: Dashboard payload.
