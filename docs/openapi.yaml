                      BidPriceEth: { type: number, format: double }
                      PrizeClaimDate:
                        type: string
                        description: RFC 822 formatted date of the prize claim time.
                      PrizeClaimTs: { type: integer, format: int64 }
                      CurRoundNum: { type: integer, format: int64 }
                      CurNumBids: { type: integer, format: int64 }
                      PrizeAmount: { type: string }
                      PrizeAmountEth: { type: number, format: double }
                      RaffleAmount: { type: string }
                      RaffleAmountEth: { type: number, format: double }
                      StakingAmount: { type: string }
                      StakingAmountEth: { type: number, format: double }
                      TotalPrizes: { type: integer, format: int64 }
                      TotalPrizeAwards: { type: integer, format: int64 }
                      CgPrizeRowCount: { type: integer, format: int64 }
                      TotalPrizesPaidAmountEth: { type: number, format: double }
                      TotalEthDonatedAmount: { type: string }
                      TotalEthDonatedAmountEth: { type: number, format: double }
                      LastBidderAddr: { type: string }
                      NumVoluntaryDonations: { type: integer, format: int64 }
                      SumVoluntaryDonationsEth: { type: number, format: double }
                      NumRwalkTokensUsed: { type: integer, format: int64 }
                      PriceIncrease: { type: string }
                      TimeIncrease: { type: string }
                      MainPrizeTimeIncrementInMicroSeconds: { type: string }
                      InitialSecondsUntilPrize: { type: integer, format: int64 }
                      TimeoutClaimPrize: { type: integer, format: int64 }
                      RoundStartCSTAuctionLength: { type: integer, format: int64 }
                      CstDutchAuctionDurationChangeDivisor: { type: integer, format: int64 }
                      ContractMechanicsVersion:
