                      NumRaffleEthWinnersBidding: { type: integer, format: int64 }
                      NumRaffleNFTWinnersBidding: { type: integer, format: int64 }
                      NumRaffleNFTWinnersStakingRWalk: { type: integer, format: int64 }
                      NumUniqueBidders: { type: integer, format: int64 }
