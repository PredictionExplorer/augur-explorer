openapi: 3.1.0
info:
  title: RWCG Backend API
  version: 1.0.0
  description: |
    **DEPRECATED (2026-07-16):** the v1 API is frozen and deprecated. Every
    `/api/cosmicgame/*` and `/api/randomwalk/*` operation is marked
    `deprecated: true` and answers with an RFC 9745 `Deprecation` header plus
    a `Link` to the migration guide (`docs/api-v2-migration.md`), which maps
    every v1 path to its `/api/v2` replacement in `docs/openapi-v2.yaml` —
    the canonical specification for new integrations. v1 keeps answering
    byte-identically until the sunset gates of ADR-0005 are met (announced
    via the `Sunset` header); the exceptions that are *not* deprecated are
    the operational endpoints (`/healthz`, `/readyz`, `/version`), the
    contract-pinned metadata routes and the FAQ proxy.

    JSON API served by cmd/apiserver (net/http) for two related on-chain projects:

    * **CosmicGame / Cosmic Signature** - a bidding game on Arbitrum. Endpoints under
      `/api/cosmicgame/*` expose bids, rounds, prizes (main prize, raffle ETH,
      Chrono Warrior, Endurance Champion), CST (Cosmic Signature NFT) and
      CosmicToken (ERC-20) data, ETH / ERC-20 / NFT donations, staking
      (CST and RandomWalk wallets), marketing rewards, admin events and
      aggregate statistics.
    * **RandomWalk NFT** - an NFT collection with an on-chain marketplace.
      Endpoints under `/api/randomwalk/*` expose token mints, trading history,
      offers, per-token and market statistics, and the beauty-contest (Elo)
      token ranking.

    Every JSON handler (unless noted otherwise) wraps its payload in a common
    envelope `{"status": 1, "error": "", ...}`; errors are reported as
    `{"status": 0, "error": "<message>"}`. A global per-IP token-bucket rate
    limit (50 rps, burst 100) applies to all routes and returns HTTP 429 when
    exceeded; mutating endpoints add stricter per-route limits.

    Route groups can be disabled per deployment with the environment switches
    ENABLE_ROUTES_COSMICGAME, ENABLE_ROUTES_RANDOMWALK and ENABLE_ROUTES_FAQ
    (all default to enabled). Static NFT asset routes (`/images/**`, `/static/**`)
    are registered only when NFT_ASSETS_ROOT / STATIC_ABI_DIR are configured and
    are not part of this specification; the Prometheus `/metrics` and pprof
    endpoints live on a separate internal listener (METRICS_ADDR) and are also
    out of scope.
servers:
  - url: https://api.example
    description: Placeholder production origin.
  - url: http://localhost:8080
    description: Local development server (HTTP_PORT=8080).
tags:
  - name: cosmicgame-bids
    description: CosmicGame bid listings, bid details, live bid prices and bid moderation.
  - name: cosmicgame-rounds
    description: CosmicGame round (prize cycle) listings and round details.
  - name: cosmicgame-prizes
    description: Prize history, ETH prize deposits (raffle / Chrono Warrior), raffle NFT winners and unclaimed winnings.
  - name: cosmicgame-staking
    description: Staking of Cosmic Signature (CST) and RandomWalk NFTs, staking actions, rewards and reward mints.
  - name: cosmicgame-donations
    description: ETH, ERC-20 and NFT donations to the game, charity wallet flows and donation claims.
  - name: cosmicgame-tokens
    description: Cosmic Signature NFT (CST) and CosmicToken (ERC-20) data, transfers, names and balances.
  - name: cosmicgame-statistics
    description: Dashboard, aggregate counters, unique participants, leaderboards and bidding analytics.
  - name: cosmicgame-system
    description: System-mode changes, admin events, marketing wallet and blockchain time helpers.
  - name: randomwalk-tokens
    description: RandomWalk NFT mints, token info, token history and contract addresses.
  - name: randomwalk-trading
    description: RandomWalk marketplace offers, floor price, trading and sale history.
  - name: randomwalk-ranking
    description: Beauty-contest token ranking (Elo), random explore pairs and wallet-signed votes.
  - name: randomwalk-statistics
    description: RandomWalk collection and market statistics, charts and reports.
  - name: metadata
    description: ERC-721 tokenURI metadata endpoints (OpenSea-compatible JSON).
  - name: faq
    description: FAQ bot proxy (forwards to the Python faq-bot backend).
  - name: system
    description: Liveness and readiness probes.
components:
  securitySchemes:
    AdminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: Shared-secret admin key compared against env ADMIN_API_KEY. When the variable is unset the guarded endpoints fail closed with HTTP 503.
    RankingAdminKey:
      type: apiKey
      in: header
      name: X-Ranking-Admin-Key
      description: Shared-secret ranking admin key compared against env RANKING_ADMIN_KEY (falls back to ADMIN_API_KEY). When neither is set the endpoint fails closed with HTTP 503.
  parameters:
    OffsetPath:
      name: offset
      in: path
      required: true
      description: Number of records to skip (0-based). A few endpoints give -1 a special meaning (see their descriptions).
      schema: { type: integer }
    LimitPath:
      name: limit
      in: path
      required: true
      description: Maximum number of records to return. A value of 0 is replaced by the server-side default of 20.
      schema: { type: integer }
    UserAddrPath:
      name: user_addr
      in: path
      required: true
      description: Ethereum address of the user (0x-prefixed hex).
      schema: { type: string }
    TokenIdPath:
      name: token_id
      in: path
      required: true
      description: Token id (ERC-721).
      schema: { type: integer, format: int64 }
    RoundNumPath:
      name: round_num
      in: path
      required: true
      description: CosmicGame round (prize cycle) number.
      schema: { type: integer, format: int64 }
    PrizeNumPath:
      name: prize_num
      in: path
      required: true
      description: Round (prize cycle) number.
      schema: { type: integer, format: int64 }
    RecordIdPath:
      name: record_id
      in: path
      required: true
      description: Database record id.
      schema: { type: integer, format: int64 }
    ActionIdPath:
      name: action_id
      in: path
      required: true
      description: Staking action id.
      schema: { type: integer, format: int64 }
    InitTsPath:
      name: init_ts
      in: path
      required: true
      description: Start of the time range (unix seconds).
      schema: { type: integer }
    FinTsPath:
      name: fin_ts
      in: path
      required: true
      description: End of the time range (unix seconds). 0 is replaced by 2147483647 (no upper bound).
      schema: { type: integer }
    IntervalSecsPath:
      name: interval_secs
      in: path
      required: true
      description: Sampling bucket size in seconds.
      schema: { type: integer }
  responses:
    BadRequest:
      description: Invalid request - bad or missing parameter, malformed JSON body, database link not configured, record not found, or an upstream RPC/contract error. Body uses the shared error envelope with status=0.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    TooManyRequests:
      description: Per-IP rate limit exceeded (global token bucket 50 rps / burst 100; mutating endpoints use stricter per-route limits).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnauthorizedAdmin:
      description: Invalid or missing admin key header.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    AdminKeyNotConfigured:
      description: Endpoint disabled because no admin key is configured on the server (fails closed).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    Envelope:
      type: object
      description: Common response envelope. status is 1 on success and 0 on error; error is empty on success.
      required: [status, error]
      properties:
        status:
          type: integer
          description: 1 on success, 0 on error.
        error:
          type: string
          description: Error message; empty string on success.
    ErrorResponse:
      type: object
      description: Shared error envelope (status=0 with a human-readable message).
      required: [status, error]
      properties:
        status:
          type: integer
          const: 0
        error:
          type: string
    Transaction:
      type: object
      description: Common transaction/event reference attached to most records.
      properties:
        EvtLogId: { type: integer, format: int64 }
        BlockNum: { type: integer, format: int64 }
        TxId: { type: integer, format: int64 }
        TxHash: { type: string }
        TimeStamp:
          type: integer
          format: int64
          description: Unix seconds.
        DateTime:
          type: string
          description: Formatted date-time string for TimeStamp.
    CGBidRec:
      type: object
      description: One CosmicGame bid.
      properties:
        Tx: { $ref: '#/components/schemas/Transaction' }
        BidderAid: { type: integer, format: int64 }
        BidderAddr: { type: string }
        EthPrice:
          type: string
          description: Paid ETH price in wei (decimal string); -1 for CST bids.
        EthPriceEth: { type: number, format: double }
        CstPrice:
          type: string
          description: Paid CST price in wei (decimal string); -1 for ETH bids.
        CstPriceEth: { type: number, format: double }
        RWalkNFTId:
          type: integer
          format: int64
          description: RandomWalk token id used for the bid, or -1.
        RoundNum: { type: integer, format: int64 }
        BidType:
          type: integer
          format: int64
          description: 0 = ETH, 1 = RandomWalk (ETH-paid), 2 = CST.
        BidPosition: { type: integer, format: int64 }
        PrizeTime: { type: integer, format: int64 }
        PrizeTimeDate: { type: string }
        TimeUntilPrize:
          type: integer
          format: int64
          description: Seconds until the prize (0 if the round already ended).
        CSTReward: { type: string }
        CSTRewardEth: { type: number, format: double }
        BidCstRewardAmount:
          type: string
          description: IBiddingV2 BidPlaced reward in wei; -1 for legacy V1 bids.
        BidCstRewardAmountEth: { type: number, format: double }
        CstDutchAuctionDuration:
          type: string
          description: Per-bid auction duration (IBiddingV2); -1 for legacy bids.
        CstDutchAuctionDurationInt: { type: integer, format: int64 }
        NFTDonationTokenId: { type: integer, format: int64 }
        NFTDonationTokenAddr: { type: string }
        NFTTokenURI: { type: string }
        ImageURL: { type: string }
        Message: { type: string }
        DonatedERC20TokenAddr: { type: string }
        DonatedERC20TokenAmount: { type: string }
        DonatedERC20TokenAmountEth: { type: number, format: double }
    BidMessageTx:
      type: object
      properties:
        evtLogId: { type: integer, format: int64 }
        blockNum: { type: integer, format: int64 }
        txId: { type: integer, format: int64 }
        txHash: { type: string }
        timeStamp: { type: integer, format: int64 }
        dateTime: { type: string }
    BidWithMessage:
      type: object
      description: Bid-with-message projection used by the bid messages endpoint.
      properties:
        evtLogId: { type: integer, format: int64 }
        gesturePosition: { type: integer, format: int64 }
        roundNum: { type: integer, format: int64 }
        participantAddr: { type: string }
        timeStamp: { type: integer, format: int64 }
        dateTime: { type: string }
        message: { type: string }
        BidCstRewardAmount: { type: string }
        BidCstRewardAmountEth: { type: number, format: double }
        CstDutchAuctionDuration: { type: string }
        CstDutchAuctionDurationInt: { type: integer, format: int64 }
        tx: { $ref: '#/components/schemas/BidMessageTx' }
    CGBannedBidRec:
      type: object
      description: One row of the moderated (banned) bid list.
      properties:
        id: { type: integer, format: int64 }
        bid_id: { type: integer, format: int64 }
        user_addr: { type: string }
        created_at:
          type: integer
          format: int64
          description: Unix seconds.
    CGClaimPrizeTx:
      type: object
      properties:
        Tx: { $ref: '#/components/schemas/Transaction' }
    CGMainPrizeInfo:
      type: object
      properties:
        WinnerAid: { type: integer, format: int64 }
        WinnerAddr: { type: string }
        TimeoutTs: { type: integer, format: int64 }
        EthAmount:
          type: string
          description: Wei amount (decimal string).
        EthAmountEth: { type: number, format: double }
        CstAmount: { type: string }
        CstAmountEth: { type: number, format: double }
        NftTokenId: { type: integer, format: int64 }
        Seed: { type: string }
    CGCharityDeposit:
      type: object
      properties:
        CharityAddress: { type: string }
        CharityAmount: { type: string }
        CharityAmountETH: { type: number, format: double }
    CGStakingDeposit:
      type: object
      properties:
        StakingDepositId: { type: integer, format: int64 }
        StakingDepositAmount: { type: string }
        StakingDepositAmountEth: { type: number, format: double }
        StakingPerToken: { type: string }
        StakingPerTokenEth: { type: number, format: double }
        StakingNumStakedTokens: { type: integer, format: int64 }
    CGEnduranceChampionPrize:
      type: object
      properties:
        WinnerAddr: { type: string }
        NftTokenId: { type: integer, format: int64 }
        CstAmount: { type: string }
        CstAmountEth: { type: number, format: double }
    CGLastCSTBidderPrize:
      type: object
      properties:
        WinnerAddr: { type: string }
        NftTokenId: { type: integer, format: int64 }
        CstAmount: { type: string }
        CstAmountEth: { type: number, format: double }
    CGChronoWarriorPrize:
      type: object
      properties:
        WinnerAddr: { type: string }
        EthAmount: { type: string }
        EthAmountEth: { type: number, format: double }
        CstAmount: { type: string }
        CstAmountEth: { type: number, format: double }
        NftTokenId: { type: integer, format: int64 }
    CGRoundStats:
      type: object
      properties:
        RoundNum: { type: integer, format: int64 }
        TotalBids: { type: integer, format: int64 }
        TotalDonatedNFTs: { type: integer, format: int64 }
        NumERC20Donations: { type: integer, format: int64 }
        TotalRaffleEthDeposits: { type: string }
        TotalRaffleEthDepositsEth: { type: number, format: double }
        TotalRaffleNFTs: { type: integer, format: int64 }
        TotalDonatedCount: { type: integer, format: int64 }
        TotalDonatedAmount: { type: string }
        TotalDonatedAmountEth: { type: number, format: double }
        TotalCstInBidsEth: { type: number, format: double }
        TotalEthInBidsEth: { type: number, format: double }
        ParamWindowStartTime:
          type: string
          description: ISO 8601 date-time string.
        ActivationTime:
          type: integer
          format: int64
          description: Unix seconds; 0 when not set.
        DelayDurationBeforeRoundActivation: { type: integer, format: int64 }
        ParamWindowDurationSeconds: { type: integer, format: int64 }
        RoundStartTime:
          type: string
          description: ISO 8601 date-time string.
        RoundEndTime:
          type: string
          description: ISO 8601 date-time string.
        RoundDurationSeconds: { type: integer, format: int64 }
    CGPrizeHistory:
      type: object
      description: One prize record from the unified prize table.
      properties:
        Tx: { $ref: '#/components/schemas/Transaction' }
        RecordType:
          type: integer
          format: int64
          description: 0 ETH raffle, 1 CS NFT raffle, 2 donated NFT, 3 main prize, 4 staking deposit, 5 CST mint (RandomWalk staker), 6 CST mint (CST staker), 7 endurance NFT, 8 last-CST-bid NFT, 9 endurance ERC-20, 10 last-CST-bid ERC-20, 11 donated ERC-20, 12 Chrono Warrior, 16 donated NFT (timeout), 17 donated ERC-20 (timeout), 18 raffle ETH (timeout).
        RoundNum: { type: integer, format: int64 }
        Amount: { type: string }
        AmountEth: { type: number, format: double }
        WinnerIndex: { type: integer, format: int64 }
        TokenAddress: { type: string }
        TokenId: { type: integer, format: int64 }
        TokenURI: { type: string }
        Claimed: { type: boolean }
        IsTimeoutClaim: { type: boolean }
        WinnerAddr: { type: string }
        WinnerAid: { type: integer, format: int64 }
    CGRaffleNFTWinnerRec:
      type: object
      properties:
        RecordId: { type: integer, format: int64 }
        Tx: { $ref: '#/components/schemas/Transaction' }
        WinnerAddr: { type: string }
        WinnerAid: { type: integer, format: int64 }
        RoundNum: { type: integer, format: int64 }
        TokenId: { type: integer, format: int64 }
        CstAmount: { type: string }
        CstAmountEth: { type: number, format: double }
        WinnerIndex: { type: integer, format: int64 }
        IsRWalk: { type: boolean }
        IsStaker: { type: boolean }
    CGPrizeDepositRec:
      type: object
      description: One ETH prize deposit held in PrizesWallet.
      properties:
        RecordId: { type: integer, format: int64 }
        Tx: { $ref: '#/components/schemas/Transaction' }
        RecordType:
          type: integer
          format: int64
          description: 0 undefined, 1 raffle deposit, 2 Chrono Warrior.
        WinnerAddr: { type: string }
        WinnerAid: { type: integer, format: int64 }
        WinnerIndex: { type: integer, format: int64 }
        RoundNum: { type: integer, format: int64 }
        Amount:
          type: number
          format: double
          description: Deposit amount in ETH.
        Claimed: { type: boolean }
        ClaimTimeStamp: { type: integer, format: int64 }
        ClaimDateTime: { type: string }
    CGRoundRec:
      type: object
      description: Full per-round record with all prize components.
      properties:
        RoundNum: { type: integer, format: int64 }
        ClaimPrizeTx: { $ref: '#/components/schemas/CGClaimPrizeTx' }
        MainPrize: { $ref: '#/components/schemas/CGMainPrizeInfo' }
        CharityDeposit: { $ref: '#/components/schemas/CGCharityDeposit' }
        StakingDeposit: { $ref: '#/components/schemas/CGStakingDeposit' }
        EnduranceChampion: { $ref: '#/components/schemas/CGEnduranceChampionPrize' }
        LastCstBidder: { $ref: '#/components/schemas/CGLastCSTBidderPrize' }
        ChronoWarrior: { $ref: '#/components/schemas/CGChronoWarriorPrize' }
        RoundStats: { $ref: '#/components/schemas/CGRoundStats' }
        RaffleNFTWinners:
          type: array
          items: { $ref: '#/components/schemas/CGRaffleNFTWinnerRec' }
        StakingNFTWinners:
          type: array
          items: { $ref: '#/components/schemas/CGRaffleNFTWinnerRec' }
        RaffleETHDeposits:
          type: array
          items: { $ref: '#/components/schemas/CGPrizeDepositRec' }
        AllPrizes:
          type: array
          items: { $ref: '#/components/schemas/CGPrizeHistory' }
    CGStakeStatsCST:
      type: object
      properties:
        TotalNumStakeActions: { type: integer, format: int64 }
        TotalNumUnstakeActions: { type: integer, format: int64 }
        TotalTokensStaked: { type: integer, format: int64 }
        TotalReward: { type: string }
        TotalRewardEth: { type: number, format: double }
        UnclaimedReward: { type: string }
        UnclaimedRewardEth: { type: number, format: double }
        NumActiveStakers: { type: integer, format: int64 }
        NumDeposits: { type: integer, format: int64 }
    CGStakeStatsRWalk:
      type: object
      properties:
        TotalNumStakeActions: { type: integer, format: int64 }
        TotalNumUnstakeActions: { type: integer, format: int64 }
        TotalTokensStaked: { type: integer, format: int64 }
        TotalTokensMinted: { type: integer, format: int64 }
        NumActiveStakers: { type: integer, format: int64 }
    CGUserInfo:
      type: object
      properties:
        AddressId: { type: integer, format: int64 }
        Address: { type: string }
        NumPrizes: { type: integer, format: int64 }
        NumBids: { type: integer, format: int64 }
        MaxWinAmount: { type: number, format: double }
        MaxBidAmount: { type: number, format: double }
        SumRaffleEthWinnings: { type: number, format: double }
        SumRaffleEthWithdrawal: { type: number, format: double }
        NumRaffleEthWinnings: { type: integer, format: int64 }
        RaffleNFTsCount: { type: integer, format: int64 }
        RewardNFTsCount: { type: integer, format: int64 }
        UnclaimedNFTs: { type: integer, format: int64 }
        TotalCSTokensWon: { type: integer, format: int64 }
        CosmicSignatureNumTransfers: { type: integer, format: int64 }
        TotalDonatedCount: { type: integer, format: int64 }
        TotalDonatedAmountEth: { type: number, format: double }
        StakingStatisticsRWalk: { $ref: '#/components/schemas/CGStakeStatsRWalk' }
    CGDonatedTokenDistrRec:
      type: object
      properties:
        ContractAddr: { type: string }
        NumDonatedTokens: { type: integer, format: int64 }
    CGStatistics:
      type: object
      description: Global CosmicGame statistics (dashboard MainStats).
      properties:
        TotalBids: { type: integer, format: int64 }
        CurNumBids: { type: integer, format: int64 }
        TotalPrizes: { type: integer, format: int64 }
        TotalPrizeAwards: { type: integer, format: int64 }
        CgPrizeRowCount: { type: integer, format: int64 }
        NumUniqueBidders: { type: integer, format: int64 }
        NumUniqueWinners: { type: integer, format: int64 }
        NumUniqueStakersCST: { type: integer, format: int64 }
        NumUniqueStakersRWalk: { type: integer, format: int64 }
        NumUniqueStakersBoth: { type: integer, format: int64 }
        TotalPrizesPaidAmountWei: { type: string }
        TotalPrizesPaidAmountEth: { type: number, format: double }
        NumUniqueDonors: { type: integer, format: int64 }
        TotalEthDonatedAmount: { type: string }
        TotalEthDonatedAmountEth: { type: number, format: double }
        NumVoluntaryDonations: { type: integer, format: int64 }
        SumVoluntaryDonationsEth: { type: number, format: double }
        NumCosmicGameDonations: { type: integer, format: int64 }
        SumCosmicGameDonationsEth: { type: number, format: double }
        DirectDonationsEth: { type: number, format: double }
        NumDirectDonations: { type: integer, format: int64 }
        SumWithdrawals: { type: number, format: double }
        NumWithdrawals: { type: integer, format: int64 }
        NumRwalkTokensUsed: { type: integer, format: int64 }
        NumDonatedNFTs: { type: integer, format: int64 }
        NumCSTokenMints: { type: integer, format: int64 }
        TotalNamedTokens: { type: integer, format: int64 }
        TotalRaffleEthDeposits: { type: number, format: double }
        TotalRaffleEthWithdrawn: { type: number, format: double }
        TotalChronoWarriorEthDeposits: { type: number, format: double }
        TotalCSTGivenInPrizes: { type: number, format: double }
        NumWinnersWithPendingRaffleWithdrawal: { type: integer, format: int64 }
        TotalNFTDonated: { type: integer, format: int64 }
        TotalCSTConsumed: { type: string }
        TotalCSTConsumedEth: { type: number, format: double }
        NumBidsCST: { type: integer, format: int64 }
        TotalMktRewards: { type: string }
        TotalMktRewardsEth: { type: number, format: double }
        NumMktRewards: { type: integer, format: int64 }
        DonatedTokenDistribution:
          type: array
          items: { $ref: '#/components/schemas/CGDonatedTokenDistrRec' }
        StakeStatisticsCST: { $ref: '#/components/schemas/CGStakeStatsCST' }
        StakeStatisticsRWalk: { $ref: '#/components/schemas/CGStakeStatsRWalk' }
    CosmicGameContractAddrs:
      type: object
      description: Deployed contract addresses used by the game.
      properties:
        CosmicGameAddr: { type: string }
        CosmicSignatureAddr: { type: string }
        CosmicTokenAddr: { type: string }
        CosmicDaoAddr: { type: string }
        CharityWalletAddr: { type: string }
        PrizesWalletAddr: { type: string }
        RandomWalkAddr: { type: string }
        StakingWalletCSTAddr: { type: string }
        StakingWalletRWalkAddr: { type: string }
        MarketingWalletAddr: { type: string }
        MarketplaceAddr: { type: string }
        ImplementationAddr: { type: string }
    CGUniqueBidder:
      type: object
      properties:
        BidderAid: { type: integer, format: int64 }
        BidderAddr: { type: string }
        NumBids: { type: integer, format: int64 }
        MaxBidAmount: { type: string }
        MaxBidAmountEth: { type: number, format: double }
    CGWinnerStats:
      type: object
      properties:
        MaxWinAmount: { type: string }
        MaxWinAmountEth: { type: number, format: double }
        PrizesCount: { type: integer, format: int64 }
        PrizesSum: { type: string }
        PrizesSumEth: { type: number, format: double }
        TokensCount: { type: integer, format: int64 }
        ERC20Count: { type: integer, format: int64 }
        ERC721Count: { type: integer, format: int64 }
        UnclaimedNfts: { type: integer, format: int64 }
        TotalSpent: { type: string }
        TotalSpentEth: { type: number, format: double }
    CGUniqueWinner:
      type: object
      properties:
        WinnerAid: { type: integer, format: int64 }
        WinnerAddr: { type: string }
        PrizesCount: { type: integer, format: int64 }
        MaxWinAmount: { type: string }
        MaxWinAmountEth: { type: number, format: double }
