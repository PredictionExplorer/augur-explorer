                      PrizePercentage: { type: integer, format: int64 }
                      RafflePercentage: { type: integer, format: int64 }
                      ChronoWarriorPercentage: { type: integer, format: int64 }
                      StakingPercentage: { type: integer, format: int64 }
                      CharityAddr: { type: string }
                      CharityPercentage: { type: integer, format: int64 }
