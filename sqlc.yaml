# sqlc configuration: type-safe Go generated from SQL.
#
# Queries live in internal/store/queries/*.sql; the schema is derived from the
# goose migrations in db/migrations. Regenerate with `make generate` (or
# `sqlc generate`). Generated code is committed under internal/store/sqlcgen.
#
# The legacy hand-written query layer in internal/store is being converted to
# sqlc incrementally; new queries must be added here, not hand-written.
version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/store/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_pointers_for_null_types: true
