version: "2"

run:
  timeout: 10m
  build-tags:
    - integration

linters:
  # Standard set: errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - bodyclose      # HTTP response bodies must be closed
    - copyloopvar    # detects pre-Go1.22 loop-var copies that are now redundant
    - depguard       # banned imports (see settings: lib/pq must stay retired)
    - errchkjson     # JSON encode errors checked; unsafe types surfaced
    - errname        # error vars named errFoo, types named FooError
    - errorlint      # errors compared/wrapped with errors.Is/As/%w
    - exhaustive     # enum switches handle every value (or declare a default)
    - godot          # comments end in a period
    - gosec          # security checks (SQL building, file perms, crypto)
    - intrange       # Go 1.22 range-over-int instead of C-style loops
    - misspell       # commonly misspelled English words
    - noctx          # HTTP requests must carry a context
    - nolintlint     # nolint directives must be specific and justified
    - prealloc       # preallocate slices with a knowable capacity
    - reassign       # no reassignment of other packages' variables
    - revive         # doc-comment enforcement only; see settings below
    - rowserrcheck   # sql.Rows.Err must be checked
    - sqlclosecheck  # sql.Rows/Stmt must be closed
    - thelper        # test helpers call t.Helper() and name testing.TB "tb"
    - tparallel      # parallel parents parallelize their subtests
    - unconvert      # redundant type conversions
    - unparam        # unused function parameters
    - usestdlibvars  # http.StatusOK instead of 200, etc.
    - usetesting     # t.Setenv/t.TempDir/t.Context instead of os equivalents
    - wastedassign   # assignments never read
    # Deliberately not enabled (§8.4): contextcheck (its inherited-context
    # heuristics fight the engines' deliberate context.WithoutCancel batch
    # completion), paralleltest (t.Parallel over the shared testcontainer
    # harnesses would race the fixture-restoring mutation tests), testifylint
    # (the repository uses the standard library test style, not testify),
    # nilerr (the v2 strict handlers legitimately return (problemResponse,
    # nil) after mapping an error to its RFC 9457 response, and the indexer
    # retry loops deliberately absorb errors they have logged — annotating
    # ~30 correct sites buys nothing).
  settings:
    depguard:
      rules:
        # The one-driver sprint retired lib/pq: every PostgreSQL access path
        # (store, ops tooling, tests) runs on pgx. This gate keeps the second
        # driver from creeping back in (same ratchet class as the gin removal).
        one-postgres-driver:
          deny:
            - pkg: github.com/lib/pq
              desc: "use pgx (github.com/jackc/pgx/v5); lib/pq was retired by the one-driver sprint"
    errcheck:
      exclude-functions:
        # Best-effort writes to HTTP clients / loggers.
        - (*net/http.Response.Body).Close
        # Best-effort human-readable output (CLI writers, stdout); code that
        # writes data files checks errors explicitly via bufio/Close.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    exhaustive:
      # A default case is a deliberate statement about the remaining values;
      # switches without one must enumerate the enum completely.
      default-signifies-exhaustive: true
    revive:
      # Only the documentation rules run (an empty rule list would enable
      # revive's whole default set): every exported symbol and every package
      # carries a doc comment (MODERNIZATION.md §8.5).
      rules:
        - name: exported
        - name: package-comments
    staticcheck:
      checks:
        - all
      # The staticcheck default list minus "TS": short timestamp suffixes
      # (initTs, finTs) are pervasive and "TS" adds no clarity.
      initialisms: ["ACL", "API", "ASCII", "CPU", "CSS", "DNS", "EOF", "GUID",
        "HTML", "HTTP", "HTTPS", "ID", "IP", "JSON", "QPS", "RAM", "RPC",
        "SLA", "SMTP", "SQL", "SSH", "TCP", "TLS", "TTL", "UDP", "UI", "GID",
        "UID", "UUID", "URI", "URL", "UTF8", "VM", "XML", "XMPP", "XSRF",
        "XSS", "SIP", "RTP", "AMQP", "DB"]
  exclusions:
    generated: lax
    warn-unused: false
    rules:
      # Generated contract bindings are vendored as-is (the handwritten
      # contracts/internal/buildjson tooling is fully linted).
      - path: ^contracts/(cosmicgame|randomwalk)/
        linters:
          - errcheck
          - gosec
          - staticcheck
          - unused
          - unconvert
          - unparam
          - revive
      # The v1 wire model serializes by field name (no JSON tags), so the
      # legacy Id/Ts field spellings are frozen by the parity goldens and
      # cannot follow the initialism convention until v1 is retired with
      # docs/MODERNIZATION.md §6.3.
      - path: ^internal/model/
        text: "ST1003"
      # Context-free request/listen constructors are idiomatic in tests
      # (httptest.NewRequest carries context.Background by design), and
      # table-driven fixture literals stay readable without capacity hints
      # (prealloc is a production micro-optimization).
      - path: _test\.go$
        linters:
          - noctx
          - prealloc
      # The ETL fixture and story tables defer log construction in
      # per-entry closures. A failure must attribute to the fixture entry
      # itself, so t.Helper() (which would re-attribute to the replay
      # harness) is deliberately absent from them.
      - path: (cosmicgame|randomwalk)/(fixtures|story)_test\.go$
        linters:
          - thelper

formatters:
  enable:
    - gofmt
    - gofumpt
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - localmodule
  exclusions:
    paths:
      - ^contracts/(cosmicgame|randomwalk)/
