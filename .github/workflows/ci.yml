name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify generated API code
        run: make generate-check
      - name: Build all packages
        run: go build ./...
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests (race detector, shuffled)
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...
      - name: Report coverage
        run: go tool cover -func=coverage.out | tail -1

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run integration tests (testcontainers)
        run: go test -race -tags=integration -timeout 20m -coverprofile=coverage-integration.out -coverpkg=./internal/... ./...
      - name: Enforce internal/ coverage ratchet
        # Ratchet, never lower: raise the floor after each phase lands
        # (docs/MODERNIZATION.md §4.6). Current measured coverage: 73.6%.
        run: |
          total=$(go tool cover -func=coverage-integration.out | tail -1 | awk '{print $3}' | tr -d '%')
          floor=73.5
          echo "internal/ statement coverage: ${total}% (ratchet floor: ${floor}%)"
          if ! awk -v t="$total" -v f="$floor" 'BEGIN { exit !(t+0 >= f+0) }'; then
            echo "::error::internal/ coverage ${total}% fell below the ratchet floor ${floor}%"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  vulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
