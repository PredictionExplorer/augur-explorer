name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify generated API code
        run: make generate-check
      - name: Build all packages
        run: go build ./...
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests (race detector, shuffled)
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...
      - name: Report coverage
        run: go tool cover -func=coverage.out | tail -1

  test-integration:
    name: Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run integration tests (testcontainers)
        run: |
          go test -race -tags=integration -timeout 20m \
            -covermode=atomic \
            -coverprofile=coverage-integration.out \
            -coverpkg=./cmd/...,./internal/... \
            ./...
      - name: Build changed-code coverage diff
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --unified=0 --no-color --diff-filter=ACMR \
              "${{ github.event.pull_request.base.sha }}...${{ github.sha }}" \
              -- '*.go' > coverage.diff
          else
            : > coverage.diff
          fi
      - name: Enforce coverage policy
        run: |
          ./scripts/coverage-gate.sh \
            --profile coverage-integration.out \
            --diff coverage.diff \
            --report coverage-report.json
      - name: Upload coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-evidence
          path: |
            coverage-integration.out
            coverage.diff
            coverage-report.json
          if-no-files-found: ignore

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  vulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
